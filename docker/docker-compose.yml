services:
  mysql-local:
    # local 프로필에서 사용하는 MySQL
    profiles: ["local"]
    image: mysql:8.4
    container_name: moongchijang-mysql-local
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-moongchijang_local}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${MYSQL_USER:-moongchijang}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-moongchijang}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-local-data:/var/lib/mysql
    restart: unless-stopped

  redis-local:
    # local 프로필에서 사용하는 Redis
    profiles: ["local"]
    image: redis:7-alpine
    container_name: moongchijang-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis-local-data:/data
    restart: unless-stopped

  app-dev:
    # develop 태그 이미지를 사용하는 dev 애플리케이션
    profiles: ["dev"]
    image: ${ECR_REPOSITORY_URL}:develop
    container_name: moongchijang-dev
    env_file:
      - ../.env.dev
    restart: unless-stopped
    networks:
      - monitoring

  app-prod:
    # main 태그 이미지를 사용하는 prod 애플리케이션
    profiles: ["prod"]
    image: ${ECR_REPOSITORY_URL}:main
    container_name: moongchijang-prod
    env_file:
      - ../.env.prod
    restart: unless-stopped
    networks:
      - monitoring

  nginx:
    # 공용 리버스 프록시. prod는 /, dev는 /dev/ 경로로 라우팅
    image: nginx:1.29-alpine
    container_name: moongchijang-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - monitoring

  qdrant:
    # 벡터 검색 평가용. search-eval 프로필에서만 기동
    profiles: ["search-eval"]
    image: qdrant/qdrant:latest
    container_name: moongchijang-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped

  prometheus:
    # 모니터링 스택의 메트릭 수집기
    profiles: ["monitoring"]
    image: prom/prometheus:v2.55.1
    container_name: moongchijang-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    # 모니터링 스택의 알림 라우터
    profiles: ["monitoring"]
    image: prom/alertmanager:v0.27.0
    container_name: moongchijang-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    environment:
      ALERT_ENV: ${ALERT_ENV:-prod}
      ALERT_SERVICE: ${ALERT_SERVICE:-moongchijang-be}
      DISCORD_WEBHOOK_MONITORING_CRITICAL: ${DISCORD_WEBHOOK_MONITORING_CRITICAL:-https://discord.com/api/webhooks/placeholder/critical}
      DISCORD_WEBHOOK_MONITORING_WARNING: ${DISCORD_WEBHOOK_MONITORING_WARNING:-https://discord.com/api/webhooks/placeholder/warning}
      DISCORD_WEBHOOK_PAYMENT: ${DISCORD_WEBHOOK_PAYMENT:-https://discord.com/api/webhooks/placeholder/payment}
    command:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s|__ALERT_ENV__|$${ALERT_ENV}|g" \
          -e "s|__ALERT_SERVICE__|$${ALERT_SERVICE}|g" \
          -e "s|__DISCORD_WEBHOOK_MONITORING_CRITICAL__|$${DISCORD_WEBHOOK_MONITORING_CRITICAL}|g" \
          -e "s|__DISCORD_WEBHOOK_MONITORING_WARNING__|$${DISCORD_WEBHOOK_MONITORING_WARNING}|g" \
          -e "s|__DISCORD_WEBHOOK_PAYMENT__|$${DISCORD_WEBHOOK_PAYMENT}|g" \
          /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.generated.yml
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.generated.yml \
          --storage.path=/alertmanager
    restart: unless-stopped
    networks:
      - monitoring

  loki:
    # 모니터링 스택의 로그 저장소
    profiles: ["monitoring"]
    image: grafana/loki:3.1.1
    container_name: moongchijang-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command:
      - -config.file=/etc/loki/config.yml
    restart: unless-stopped
    networks:
      - monitoring

  fluent-bit:
    # Docker 컨테이너 stdout/stderr 로그를 Loki로 전달하는 수집기
    profiles: ["monitoring"]
    image: fluent/fluent-bit:3.1.9
    container_name: moongchijang-fluent-bit
    ports:
      - "2020:2020"
    environment:
      FLUENT_BIT_ENV: ${FLUENT_BIT_ENV:-prod}
    volumes:
      - ./monitoring/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./monitoring/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - fluent-bit-data:/fluent-bit/state
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    # 모니터링 스택의 시각화 대시보드
    profiles: ["monitoring"]
    image: grafana/grafana:11.2.0
    container_name: moongchijang-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: ${GRAFANA_SERVER_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  mysql-local-data:
  redis-local-data:
  qdrant-storage:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  loki-data:
  fluent-bit-data:

networks:
  monitoring:
    name: moongchijang-monitoring
