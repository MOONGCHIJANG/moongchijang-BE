[SERVICE]
    Flush                     1
    Daemon                    Off
    Log_Level                 info
    Parsers_File              /fluent-bit/etc/parsers.conf
    HTTP_Server               On
    HTTP_Listen               0.0.0.0
    HTTP_Port                 2020
    storage.path              /fluent-bit/state
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 10M

[INPUT]
    Name               tail
    Path               /var/lib/docker/containers/*/*-json.log
    Parser             docker
    Tag                docker.containers
    DB                 /fluent-bit/state/docker-containers.db
    Mem_Buf_Limit      50MB
    Skip_Long_Lines    On
    Refresh_Interval   5
    Read_from_Head     Off
    storage.type       filesystem

[FILTER]
    Name    modify
    Match   docker.containers
    Add     service moongchijang-be
    Add     source docker
    Add     env ${FLUENT_BIT_ENV}

[OUTPUT]
    Name          loki
    Match         docker.containers
    Host          loki
    Port          3100
    Labels        job=fluent-bit,service=$service,env=$env,source=$source
    Line_Format   json
    Drop_Single_Key Off
