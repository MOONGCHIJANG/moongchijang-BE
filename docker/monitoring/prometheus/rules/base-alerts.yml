groups:
  - name: base-alerts
    rules:
      - alert: AppTargetDown
        expr: up{job="app"} == 0
        for: 2m
        labels:
          severity: critical
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][critical] 애플리케이션 메트릭 수집 실패"
          description: "2분 이상 app-prod:8080/metrics 스크랩에 실패했습니다."

      - alert: Http5xxErrorRateWarning
        expr: |
          (
            sum by (instance) (rate(http_server_requests_seconds_count{job="app",status=~"5.."}[5m]))
            /
            sum by (instance) (rate(http_server_requests_seconds_count{job="app"}[5m]))
          ) > 0.01
          and
          sum by (instance) (rate(http_server_requests_seconds_count{job="app"}[5m])) > 0
        for: 10m
        labels:
          severity: warning
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][warning] HTTP 5xx 에러율 증가"
          description: "10분 동안 HTTP 5xx 비율이 1%를 초과했습니다."

      - alert: Http5xxErrorRateCritical
        expr: |
          (
            sum by (instance) (rate(http_server_requests_seconds_count{job="app",status=~"5.."}[5m]))
            /
            sum by (instance) (rate(http_server_requests_seconds_count{job="app"}[5m]))
          ) > 0.05
          and
          sum by (instance) (rate(http_server_requests_seconds_count{job="app"}[5m])) > 0
        for: 5m
        labels:
          severity: critical
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][critical] HTTP 5xx 에러율 급증"
          description: "5분 동안 HTTP 5xx 비율이 5%를 초과했습니다."

      - alert: HttpLatencyP95Warning
        expr: |
          histogram_quantile(
            0.95,
            sum by (instance, le) (rate(http_server_requests_seconds_bucket{job="app"}[5m]))
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][warning] HTTP p95 지연시간 증가"
          description: "10분 동안 HTTP p95 지연시간이 500ms를 초과했습니다."

      - alert: HttpLatencyP99Critical
        expr: |
          histogram_quantile(
            0.99,
            sum by (instance, le) (rate(http_server_requests_seconds_bucket{job="app"}[5m]))
          ) > 1.5
        for: 5m
        labels:
          severity: critical
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][critical] HTTP p99 지연시간 급증"
          description: "5분 동안 HTTP p99 지연시간이 1.5초를 초과했습니다."

      - alert: HighCpuWarning
        expr: process_cpu_usage{job="app"} > 0.80
        for: 10m
        labels:
          severity: warning
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][warning] CPU 사용률 증가"
          description: "10분 동안 프로세스 CPU 사용률이 80%를 초과했습니다."

      - alert: HighCpuCritical
        expr: process_cpu_usage{job="app"} > 0.90
        for: 5m
        labels:
          severity: critical
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][critical] CPU 사용률 과다"
          description: "5분 동안 프로세스 CPU 사용률이 90%를 초과했습니다."

      - alert: HighJvmHeapMemoryWarning
        expr: |
          (
            sum by (instance) (jvm_memory_used_bytes{job="app",area="heap"})
            /
            sum by (instance) (jvm_memory_max_bytes{job="app",area="heap"})
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][warning] JVM 힙 메모리 사용률 증가"
          description: "10분 동안 JVM 힙 메모리 사용률이 85%를 초과했습니다."

      - alert: LowDiskSpaceCritical
        expr: |
          (
            (disk_free_bytes{job="app"} / disk_total_bytes{job="app"}) < 0.10
          )
        for: 10m
        labels:
          severity: critical
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][critical] 디스크 여유 공간 부족"
          description: "10분 동안 디스크 여유 공간이 10% 미만입니다."

      - alert: HighGcPauseWarning
        expr: |
          (
            rate(jvm_gc_pause_seconds_sum{job="app"}[5m])
            /
            rate(jvm_gc_pause_seconds_count{job="app"}[5m])
          ) > 0.2
          and
          rate(jvm_gc_pause_seconds_count{job="app"}[5m]) > 0
        for: 10m
        labels:
          severity: warning
          service: moongchijang-be
          env: prod
        annotations:
          summary: "[prod][warning] GC 일시정지 시간 증가"
          description: "10분 동안 JVM 평균 GC pause 시간이 200ms를 초과했습니다."
