global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: infra
    static_configs:
      - targets:
          - prometheus:9090
          - alertmanager:9093

  - job_name: app
    metrics_path: /metrics
    static_configs:
      - targets:
          - app-prod:8081

  - job_name: app-dev
    metrics_path: /metrics
    static_configs:
      - targets:
          - app-dev:8081
