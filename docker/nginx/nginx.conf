events {}

http {
  # Docker embedded DNS. 앱 컨테이너가 나중에 떠도 요청 시점에 이름을 해석합니다.
  resolver 127.0.0.11 ipv6=off valid=30s;

  server {
    listen 80;
    server_name api.moongchijang.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name api.moongchijang.com;

    ssl_certificate /etc/letsencrypt/live/api.moongchijang.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.moongchijang.com/privkey.pem;

    location = /dev {
      return 301 https://$host$uri/$is_args$args;
    }

    location /dev/ {
      set $app_dev http://app-dev:8080;
      rewrite ^/dev/(.*)$ /$1 break;
      proxy_pass $app_dev;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Prefix /dev;
    }

    location / {
      set $app_prod http://app-prod:8080;
      proxy_pass $app_prod;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
