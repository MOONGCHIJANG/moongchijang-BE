services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moongchijang-dev
    env_file:
      - .env.dev
    ports:
      - "8081:8080"
    restart: unless-stopped

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moongchijang-prod
    env_file:
      - .env.prod
    ports:
      - "8082:8080"
    restart: unless-stopped
