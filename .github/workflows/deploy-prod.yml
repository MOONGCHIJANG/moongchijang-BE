name: Deploy Prod

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # JAR 빌드를 위해 JDK 21 환경을 설정하고 Gradle 캐시를 사용합니다.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      # Gradle Wrapper 실행 권한을 부여합니다.
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Docker 이미지 생성 전에 실행 가능한 JAR를 먼저 빌드합니다.
      - name: Build jar
        run: ./gradlew bootJar --no-daemon

      # Docker 이미지에서 사용할 실행 JAR 파일명을 고정합니다.
      - name: Prepare jar for Docker image
        run: |
          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          cp "$JAR_FILE" build/libs/app.jar

      # 검증된 main 이미지를 빌드하고 ECR에 push
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ARM64 기반 EC2 환경에 배포할 이미지를 빌드하기 위해 QEMU를 설정합니다.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # 특정 아키텍처 이미지를 빌드하기 위해 Buildx를 설정합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 빌드된 JAR를 포함한 Docker 이미지를 생성하고 ECR에 푸시합니다.
      - name: Build and push prod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ vars.ECR_REPOSITORY_URL }}:main

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy to prod container on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            git fetch origin
            git checkout main
            git pull origin main
            cd docker

            export ECR_REPOSITORY_URL="${{ vars.ECR_REPOSITORY_URL }}"
            ECR_REGISTRY="${ECR_REPOSITORY_URL%%/*}"
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose --profile prod pull app-prod
            docker compose --profile prod up -d nginx app-prod
