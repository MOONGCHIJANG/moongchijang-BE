name: Deploy Dev

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # GitHub Actions에서 dev 이미지를 빌드하고 ECR에 push
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ vars.ECR_REPOSITORY_URL }}:develop

  deploy:
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push

    steps:
      - name: Deploy to dev container on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            git fetch origin
            git checkout develop
            git pull origin develop
            cd docker

            export ECR_REPOSITORY_URL="${{ vars.ECR_REPOSITORY_URL }}"
            ECR_REGISTRY="${ECR_REPOSITORY_URL%%/*}"
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose --profile dev pull app-dev
            docker compose --profile dev up -d nginx app-dev
