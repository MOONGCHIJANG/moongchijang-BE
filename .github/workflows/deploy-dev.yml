name: Deploy Dev

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # JAR 빌드를 위해 JDK 21 환경을 설정하고 Gradle 캐시를 사용합니다.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      # Gradle Wrapper 실행 권한을 부여합니다.
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Docker 이미지 생성 전에 실행 가능한 JAR를 먼저 빌드합니다.
      - name: Build jar
        run: ./gradlew bootJar --no-daemon

      # Docker 이미지에서 사용할 실행 JAR 파일명을 고정합니다.
      - name: Prepare jar for Docker image
        run: |
          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          cp "$JAR_FILE" build/libs/app.jar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ARM64 기반 EC2 환경에 배포할 이미지를 빌드하기 위해 QEMU를 설정합니다.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # 특정 아키텍처 이미지를 빌드하기 위해 Buildx를 설정합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 빌드된 JAR를 포함한 Docker 이미지를 생성하고 ECR에 푸시합니다.
      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ vars.ECR_REPOSITORY_URL }}:develop

  deploy:
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push

    steps:
      - name: Deploy to dev container on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_DIR }}
            git fetch origin
            git checkout develop
            git pull origin develop
            cd docker

            export ECR_REPOSITORY_URL="${{ vars.ECR_REPOSITORY_URL }}"
            ECR_REGISTRY="${ECR_REPOSITORY_URL%%/*}"
            test -f ../.env.dev
            grep -q '^DB_URL=' ../.env.dev
            grep -q '^SPRING_PROFILES_ACTIVE=' ../.env.dev
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose --profile dev pull app-dev
            docker compose --profile dev up -d nginx app-dev
            docker compose --profile monitoring up -d --force-recreate --no-deps prometheus grafana fluent-bit

            # 태그 없는 미사용 이미지를 정리해 디스크 사용량 누적을 완화합니다.
            docker image prune -f

      - name: Wait for dev OpenAPI to be ready
        run: |
          for i in {1..20}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://api.moongchijang.com/dev/openapi.yaml)
            if [ "$status" = "200" ]; then
              echo "Dev OpenAPI is ready"
              exit 0
            fi

            echo "Dev OpenAPI not ready yet (status: $status), retrying..."
            sleep 5
          done

          echo "Dev OpenAPI did not become ready in time"
          exit 1

      - name: Trigger Frontend Orval Codegen
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FRONTEND_REPO_TOKEN }}
          repository: MOONGCHIJANG/moongchijang-FE
          event-type: backend-deployed
