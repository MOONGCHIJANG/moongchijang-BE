meta:
  id: STORE_SEARCH
  domain: store
  status: implemented
  priority: medium
  code_paths:
    - src/main/kotlin/com/moongchijang/domain/store/presentation/StoreSearchController.kt
    - src/main/kotlin/com/moongchijang/domain/store/application/StoreSearchService.kt
    - src/main/kotlin/com/moongchijang/domain/store/infrastructure/naver/NaverLocalSearchClient.kt
    - src/main/kotlin/com/moongchijang/domain/store/application/dto/StoreSearchResponse.kt
  related_requirements:
    - store search

overview:
  summary: 매장명/주소 기반 외부 검색을 수행하고 후보 매장 응답을 만든다.

business_rules:
  - Naver local search client는 infrastructure 계층에 둔다.
  - 외부 API 실패는 STORE_SEARCH_FAILED로 매핑한다.
  - 등록 매장 조회 실패는 STORE_NOT_FOUND를 사용한다.
  - 응답 DTO는 application/dto에 둔다.

testing_strategy:
  unit:
    - StoreSearchServiceTest
    - Naver fixture 기반 파싱 테스트
