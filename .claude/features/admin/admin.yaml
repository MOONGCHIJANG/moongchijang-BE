meta:
  id: ADMIN_OPERATIONS
  domain: admin
  status: implemented
  priority: medium
  code_paths:
    - src/main/kotlin/com/moongchijang/domain/admin/presentation
    - src/main/kotlin/com/moongchijang/domain/admin/application
  related_requirements:
    - admin dashboard
    - order monitoring
    - settlement
    - refund requests
    - cs tickets

overview:
  summary: 관리자 대시보드, 발주 모니터링, 정산, 환불 요청, CS 티켓 운영 기능을 담당한다.

business_rules:
  - /api/v1/admin/** 는 ROLE_ADMIN만 접근한다.
  - 대시보드 집계는 빈 결과와 null sum을 안전하게 처리한다.
  - 발주 조회는 groupBuy orderStatus/status/date 조건을 명확히 구분한다.
  - 환불 요청 상태 전이는 AdminRefundRequestStatusTransitionPolicy 기준을 따른다.
  - CS 티켓 SLA/우선순위 계산은 AdminCsTicketService 기준을 따른다.

testing_strategy:
  unit:
    - AdminDashboardSummaryServiceTest
    - AdminDashboardOrderMonitoringServiceTest
    - AdminDashboardUrgentRefundServiceTest
    - AdminOrderServiceTest
    - AdminSettlementServiceTest
    - AdminRefundRequestServiceTest
    - AdminCsTicketServiceTest
  controller:
    - AdminDashboardControllerTest
    - AdminOrderControllerTest
    - AdminSettlementControllerTest
    - AdminCsTicketControllerTest
