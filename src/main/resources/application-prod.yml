spring:
  web:
    resources:
      add-mappings: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations:
      - classpath:db/migration

server:
  forward-headers-strategy: framework

app:
  s3:
    bucket: ${S3_BUCKET}
    prefix: ${S3_PREFIX}
    region: ${APP_S3_REGION:ap-northeast-2}
    presign-expiration-seconds: ${APP_S3_PRESIGN_EXPIRATION_SECONDS:900}
    public-base-url: ${APP_S3_PUBLIC_BASE_URL:}
  share:
    base-url: ${APP_SHARE_BASE_URL:https://moongchijang.com}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://www.moongchijang.com,https://app.moongchijang.com}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

portone:
  store-id: ${PORTONE_STORE_ID}
  channel-key: ${PORTONE_CHANNEL_KEY}
  api-secret: ${PORTONE_API_SECRET}
  payment-api-base-url: ${PORTONE_PAYMENT_API_BASE_URL:https://api.portone.io}
  webhook-secret: ${PORTONE_WEBHOOK_SECRET:}
  webhook-timestamp-tolerance-seconds: ${PORTONE_WEBHOOK_TIMESTAMP_TOLERANCE_SECONDS:300}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    redirect-uri: ${KAKAO_REDIRECT_URI}

coolsms:
  api-key: ${COOLSMS_API_KEY}
  api-secret: ${COOLSMS_API_SECRET}
  sender: ${COOLSMS_SENDER}

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration-minutes: ${AUTH_ACCESS_EXPIRATION_MINUTES:60}

auth:
  refresh:
    expiration-days: ${AUTH_REFRESH_EXPIRATION_DAYS:14}

aligo:
  api-key: ${ALIGO_API_KEY}
  user-id: ${ALIGO_USER_ID}
  sender-key: ${ALIGO_SENDER_KEY}
  template-code-group-buy-open-success: ${ALIGO_TEMPLATE_GROUP_BUY_OPEN_SUCCESS:${ALIGO_TEMPLATE_CODE}}
  template-code-group-buy-open-failed: ${ALIGO_TEMPLATE_GROUP_BUY_OPEN_FAILED:${ALIGO_TEMPLATE_GROUP_BUY_OPEN_SUCCESS:${ALIGO_TEMPLATE_CODE}}}
  template-code-pickup-d1-reminder: ${ALIGO_TEMPLATE_PICKUP_D1_REMINDER:${ALIGO_TEMPLATE_GROUP_BUY_OPEN_SUCCESS:${ALIGO_TEMPLATE_CODE}}}
  template-code-pickup-day-reminder: ${ALIGO_TEMPLATE_PICKUP_DAY_REMINDER:${ALIGO_TEMPLATE_GROUP_BUY_OPEN_SUCCESS:${ALIGO_TEMPLATE_CODE}}}
  sender: ${ALIGO_SENDER}

discord:
  enabled: ${DISCORD_ENABLED:true}
  webhook:
    refund: ${DISCORD_WEBHOOK_REFUND:}
    groupbuy: ${DISCORD_WEBHOOK_GROUPBUY:}
    onboarding: ${DISCORD_WEBHOOK_ONBOARDING:}

ses:
  enabled: ${SES_ENABLED:false}
  region: ${SES_REGION}
  from-email: ${SES_FROM_EMAIL}

email:
  provider: ${EMAIL_PROVIDER:SES}

google:
  smtp:
    host: ${GOOGLE_SMTP_HOST:smtp.gmail.com}
    port: ${GOOGLE_SMTP_PORT:587}
    username: ${GOOGLE_SMTP_USERNAME:unset-username}
    app-password: ${GOOGLE_SMTP_APP_PASSWORD:unset-app-password}
    from: ${GOOGLE_SMTP_FROM:unset-from@example.com}
    connection-timeout: ${GOOGLE_SMTP_CONNECTION_TIMEOUT:5000}
    timeout: ${GOOGLE_SMTP_TIMEOUT:5000}
    write-timeout: ${GOOGLE_SMTP_WRITE_TIMEOUT:5000}

groupbuy:
  status-transition:
    fixed-delay-ms: ${GROUPBUY_STATUS_TRANSITION_FIXED_DELAY_MS:60000}
    batch-size: ${GROUPBUY_STATUS_TRANSITION_BATCH_SIZE:500}
    lock:
      wait-ms: ${GROUPBUY_STATUS_TRANSITION_LOCK_WAIT_MS:100}
      lease-ms: ${GROUPBUY_STATUS_TRANSITION_LOCK_LEASE_MS:55000}

business-registration:
  api:
    enabled: ${BUSINESS_REGISTRATION_API_ENABLED:false}
    base-url: ${BUSINESS_REGISTRATION_API_BASE_URL:https://api.odcloud.kr}
    status-path: ${BUSINESS_REGISTRATION_API_STATUS_PATH:/api/nts-businessman/v1/status}
    service-key: ${BUSINESS_REGISTRATION_API_SERVICE_KEY:}
