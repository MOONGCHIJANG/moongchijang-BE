# ─────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupBuyId:
      name: groupBuyId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ParticipationId:
      name: participationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    SuccessNoData:
      description: 성공 (데이터 없음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseEmpty'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Conflict:
      description: 상태 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    TooManyRequests:
      description: 요청 횟수 초과
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'

  schemas:

    # ── 공통 응답 래퍼 ──────────────────────────────────────────
    ApiResponseEmpty:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data: { nullable: true, example: null }
        error: { nullable: true, example: null }

    ApiResponseError:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: false }
        data: { nullable: true, example: null }
        error:
          type: object
          required: [code, message, detail]
          properties:
            code: { type: string, example: GROUPBUY_NOT_FOUND }
            message: { type: string, example: 존재하지 않는 공구입니다 }
            detail: { type: string, nullable: true }

    # ── Auth ───────────────────────────────────────────────────
    KakaoLoginRequest:
      type: object
      required: [authorizationCode]
      properties:
        authorizationCode:
          type: string
          description: 카카오 인가 코드
        redirectUri:
          type: string
          nullable: true
          description: 카카오 인가 요청 시 사용한 redirect URI (서버 검증용)

    ApiResponseAuthLogin:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [accessToken, tokenType, expiresIn, isNewUser, user]
          properties:
            accessToken: { type: string }
            tokenType: { type: string, example: Bearer }
            expiresIn: { type: integer, format: int64, description: Access Token 만료 시간(초) }
