    # ── GroupBuyRequest ────────────────────────────────────────
    GroupBuyRequestCreate:
      type: object
      required: [storeName, productName, desiredQuantity, desiredPickupDate]
      properties:
        storeName:
          type: string
          maxLength: 100
        storeAddress:
          type: string
          maxLength: 200
          nullable: true
          description: 매장 주소. roadAddress가 함께 전달되면 서버는 roadAddress를 우선 저장한다.
        placeId:
          type: string
          maxLength: 100
          nullable: true
          description: 네이버 장소 고유 ID
        roadAddress:
          type: string
          maxLength: 200
          nullable: true
          description: 네이버 장소 도로명 주소
        lotAddress:
          type: string
          maxLength: 200
          nullable: true
          description: 네이버 장소 지번 주소
        latitude:
          type: number
          format: double
          nullable: true
          description: 네이버 장소 위도
        longitude:
          type: number
          format: double
          nullable: true
          description: 네이버 장소 경도
        productName:
          type: string
          maxLength: 100
        desiredQuantity:
          type: integer
          minimum: 1
        desiredPickupDate:
          type: string
          format: date
          description: 오늘 이후 날짜
        additionalNote:
          type: string
          maxLength: 500
          nullable: true

    ApiResponseRequestId:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [requestId]
          properties:
            requestId: { type: integer, format: int64 }
        error: { nullable: true, example: null }

    GroupBuyRequestDetail:
      type: object
      required: [requestId, storeName, productName, desiredQuantity, desiredPickupDate, status, rejectionReason, openedGroupBuyId, statusHistory, createdAt]
      properties:
        requestId: { type: integer, format: int64 }
        storeName: { type: string }
        storeAddress: { type: string, nullable: true }
        placeId: { type: string, nullable: true }
        roadAddress: { type: string, nullable: true }
        lotAddress: { type: string, nullable: true }
        latitude: { type: number, format: double, nullable: true }
        longitude: { type: number, format: double, nullable: true }
        productName: { type: string }
        desiredQuantity: { type: integer }
        desiredPickupDate: { type: string, format: date }
        additionalNote: { type: string, nullable: true }
        status:
          type: string
          enum: [IN_REVIEW, IN_CONTACT, OPENED, REJECTED]
          description: |
            IN_REVIEW=검토 중 / IN_CONTACT=매장 컨택 중 /
            OPENED=공구 개설 완료 / REJECTED=개설 불가
        rejectionReason: { type: string, nullable: true, description: status=REJECTED 시 노출 }
        openedGroupBuyId: { type: integer, format: int64, nullable: true, description: status=OPENED 시 개설된 공구 id }
        statusHistory:
          type: array
          items:
            type: object
            required: [status, changedAt]
            properties:
              status:
                type: string
                enum: [IN_REVIEW, IN_CONTACT, OPENED, REJECTED]
              changedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    ApiResponseGroupBuyRequestList:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            $ref: '#/components/schemas/GroupBuyRequestDetail'
        error: { nullable: true, example: null }

