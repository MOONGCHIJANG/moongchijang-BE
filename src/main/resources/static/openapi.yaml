      responses:
        '200':
          description: 공구 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/group-buys/{groupBuyId}/progress:
    get:
