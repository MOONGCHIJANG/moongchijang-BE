  /api/v1/search:
    post:
      tags: [GroupBuy]
      summary: 검색 실행 및 FULLTEXT 기반 분류 (1.1.4-1)
      description: |
        검색어를 ngram FULLTEXT 인덱스 두 축(상품명 / 매장·주소)에 각각 매칭해 동네/상품 키워드 검출 여부를 판정하고
        최근 검색어로 저장한다. 두 인덱스 매칭 결과 조합에 따라 4가지 케이스로 분기한다.
        자체 검색 결과가 없을 때 제공되는 recommendedStores는 Naver Local Search 결과 중
        베이커리/디저트 도메인으로 분류된 매장만 반환한다.
        - PRODUCT_ONLY: 상품명 인덱스만 매치
        - NEIGHBORHOOD_ONLY: 매장/주소 인덱스만 매치
        - BOTH_DETECTED: 두 인덱스 모두 매치
        - NONE_DETECTED: 두 인덱스 모두 미매치
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keyword]
              properties:
                keyword:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: FULLTEXT 기반 분류 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSearchAnalysis'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/search/recent:
    get:
      tags: [GroupBuy]
      summary: 최근 검색어 목록 조회
      description: |
        검색창 탭 시 표시할 사용자의 최근 검색어를 최신순으로 반환한다. (1.1.4-10)
        동일 검색어는 중복 저장하지 않고 가장 최근 검색 위치로 이동한다.
        최근 검색어는 최대 10개까지 반환하며, 검색 이력이 없으면 빈 배열을 반환한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 최근 검색어 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRecentSearchList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [GroupBuy]
      summary: 최근 검색어 전체 삭제
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/search/recent/{keyword}:
    delete:
      tags: [GroupBuy]
      summary: 최근 검색어 단건 삭제
      security:
        - bearerAuth: []
      parameters:
        - name: keyword
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  # ─────────────────────────────────────────────────────────────
  # GroupBuyRequest (소비자)
  # ─────────────────────────────────────────────────────────────
  /api/v1/stores/search:
    get:
      tags: [GroupBuyRequest]
      summary: 매장 검색 자동완성 (2.1.1-1)
      description: |
        매장명 또는 주소 입력 시 외부 지도/장소 API 기반 매장 후보 목록을 반환한다.
        각 항목은 매장명과 주소를 함께 포함한다. 예: 모모양과 / 서울 성북구 화랑로11길 23
      parameters:
        - name: keyword
          in: query
          required: true
          description: 매장명 또는 주소 검색어
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 매장 후보 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreSearchList'
        '400':
          $ref: '#/components/responses/BadRequest'

