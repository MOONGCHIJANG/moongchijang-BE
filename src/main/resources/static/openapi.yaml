          schema:
            type: string
            enum: [ALL, HOLDING, RELEASED]
            default: ALL
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 정산 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettlementPage'
    post:
      tags: [Admin]
      summary: 정산 생성 및 처리
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettlementCreate'
      responses:
        '201':
          description: 정산 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettlementId'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/admin/settlements/{settlementId}/release:
    post:
      tags: [Admin]
      summary: 에스크로 해제
      security:
        - bearerAuth: []
      parameters:
        - name: settlementId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

# ─────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupBuyId:
      name: groupBuyId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ParticipationId:
      name: participationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    SuccessNoData:
      description: 성공 (데이터 없음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseEmpty'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Conflict:
      description: 상태 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    TooManyRequests:
      description: 요청 횟수 초과
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'

  schemas:

    # ── 공통 응답 래퍼 ──────────────────────────────────────────
    ApiResponseEmpty:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data: { nullable: true, example: null }
        error: { nullable: true, example: null }

    ApiResponseError:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: false }
        data: { nullable: true, example: null }
        error:
          type: object
          required: [code, message, detail]
          properties:
            code: { type: string, example: GROUPBUY_NOT_FOUND }
            message: { type: string, example: 존재하지 않는 공구입니다 }
            detail: { type: string, nullable: true }

    # ── Auth ───────────────────────────────────────────────────
    KakaoLoginRequest:
      type: object
      required: [authorizationCode]
      properties:
        authorizationCode:
          type: string
          description: 카카오 인가 코드
        redirectUri:
          type: string
          nullable: true
          description: 카카오 인가 요청 시 사용한 redirect URI (서버 검증용)

    ApiResponseAuthLogin:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [accessToken, tokenType, expiresIn, isNewUser, user]
          properties:
            accessToken: { type: string }
            tokenType: { type: string, example: Bearer }
            expiresIn: { type: integer, format: int64, description: Access Token 만료 시간(초) }
            isNewUser: { type: boolean, description: 최초 가입 여부 }
            user:
              $ref: '#/components/schemas/AuthUser'
        error: { nullable: true, example: null }

    ApiResponseAccessToken:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [accessToken, tokenType, expiresIn]
          properties:
            accessToken: { type: string }
            tokenType: { type: string, example: Bearer }
            expiresIn: { type: integer, format: int64, description: Access Token 만료 시간(초) }
        error: { nullable: true, example: null }

    ApiResponseUserInfo:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/AuthUser'
        error: { nullable: true, example: null }

    AdditionalInfoUpsertRequest:
      type: object
      required: [nickname, phoneNumber]
      properties:
        nickname:
          type: string
          description: 2~10자, 한글/영문/숫자만 허용
          minLength: 2
          maxLength: 10
          pattern: "^[A-Za-z0-9가-힣]{2,10}$"
        phoneNumber:
          type: string
          description: 하이픈 포함 휴대폰 번호 (01X-XXXX-XXXX)
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    ApiResponseNicknameAvailability:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [nickname, available]
          properties:
            nickname: { type: string, example: 뭉치장123 }
            available: { type: boolean, example: true }
        error: { nullable: true, example: null }

    ApiResponseAdditionalInfoUpdated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [id, nickname, phoneNumber, signupCompleted]
          properties:
            id: { type: integer, format: int64 }
            nickname: { type: string }
            phoneNumber: { type: string }
            signupCompleted: { type: boolean, example: true }
        error: { nullable: true, example: null }

    ApiResponseEmailAvailability:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [email, available]
          properties:
            email:
              type: string
              format: email
            available:
              type: boolean
              example: true
        error: { nullable: true, example: null }

    EmailVerificationCodeSendRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ApiResponseEmailVerificationCodeSent:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [expiresInSeconds, resendAvailableInSeconds, remainingDailyAttempts]
          properties:
            expiresInSeconds: { type: integer, example: 180 }
            resendAvailableInSeconds: { type: integer, example: 60 }
            remainingDailyAttempts: { type: integer, example: 4 }
        error: { nullable: true, example: null }

    EmailVerificationCodeVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: "^[0-9]{6}$"

    ApiResponseEmailVerificationVerified:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [verified, signupToken]
          properties:
            verified: { type: boolean, example: true }
            signupToken:
              type: string
              description: 이메일 회원가입 단계 진행용 임시 토큰
        error: { nullable: true, example: null }

    EmailSignupRequest:
      type: object
      required: [email, password, signupToken]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 20
          pattern: "^(?=.*[A-Za-z])(?=.*[0-9]).{8,20}$"
          description: 8~20자, 영문+숫자 포함
        signupToken:
          type: string

    EmailLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    PasswordResetLinkRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ProfileUpdateRequest:
      type: object
      required: [nickname, phoneNumber]
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 10
          pattern: "^[A-Za-z0-9가-힣]{2,10}$"
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    ApiResponseProfileUpdated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [id, nickname, phoneNumber, updatedAt]
          properties:
            id: { type: integer, format: int64 }
            nickname: { type: string }
            phoneNumber: { type: string }
            updatedAt: { type: string, format: date-time }
        error: { nullable: true, example: null }

    PhoneVerificationCodeSendRequest:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    ApiResponsePhoneVerificationCodeSent:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [expiresInSeconds, resendAvailableInSeconds]
          properties:
            expiresInSeconds: { type: integer, example: 180 }
            resendAvailableInSeconds: { type: integer, example: 60 }
        error: { nullable: true, example: null }

    PhoneVerificationCodeVerifyRequest:
      type: object
      required: [phoneNumber, code]
      properties:
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"
        code:
          type: string
          pattern: "^[0-9]{6}$"

    ApiResponsePhoneVerificationVerified:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [verified]
          properties:
            verified: { type: boolean, example: true }
        error: { nullable: true, example: null }

    PasswordChangeRequest:
      type: object
      required: [currentPassword, newPassword, newPasswordConfirm]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 20
          pattern: "^(?=.*[A-Za-z])(?=.*[0-9]).{8,20}$"
          description: 8~20자, 영문+숫자 포함
        newPasswordConfirm:
          type: string

    AuthUser:
      type: object
      required: [id, provider, role, signupCompleted, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        provider:
          type: string
          enum: [KAKAO, EMAIL]
        providerId:
          type: string
          nullable: true
          description: 소셜 제공자 아이디 (카카오 고유 ID 등)
        email:
          type: string
          format: email
          nullable: true
        nickname:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        role:
          type: string
          enum: [BUYER, SELLER, ADMIN]
        signupCompleted: { type: boolean }
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Region ─────────────────────────────────────────────────
    ApiResponseRegionOptions:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [regions]
          properties:
            regions:
              type: array
              description: "전국 시/도 목록"
              items:
                type: string
              example: [서울, 경기, 인천, 부산, 대구, 광주, 대전, 울산, 세종, 강원, 충북, 충남, 전북, 전남, 경북, 경남, 제주]
        error: { nullable: true, example: null }

    ApiResponseMyRegions:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [regions, primaryRegion, additionalCount]
          properties:
            regions:
              type: array
              description: "선택한 관심 지역 목록 (등록 순, 시/도 단위)"
              items:
                type: string
            primaryRegion:
              type: string
              nullable: true
              description: "칩에 표시할 첫 번째 지역명. 비어있으면 null"
            additionalCount:
              type: integer
              description: "primaryRegion 외 추가 지역 수. 예: 서울 외 3곳 → additionalCount=3"
        error: { nullable: true, example: null }

    UpdateRegionsRequest:
      type: object
      required: [regions]
      properties:
        regions:
          type: array
          maxItems: 10
          description: "저장할 시/도 지역 목록. 빈 배열이면 전체 해제"
          items:
            type: string

    # ── GroupBuy ───────────────────────────────────────────────
    GroupBuyFeedItem:
      type: object
      required: [id, storeName, region, productName, thumbnailUrl, price, achievementRate, currentQuantity, targetQuantity, maxQuantity, deadline, pickupDate, pickupTimeStart, pickupTimeEnd, dDay, isWishlisted, isClosed, canParticipate]
      properties:
        id: { type: integer, format: int64 }
        storeName: { type: string }
        region: { type: string }
        productName: { type: string }
        thumbnailUrl: { type: string }
        price: { type: integer }
        achievementRate: { type: integer, description: 달성률 % }
        currentQuantity: { type: integer }
        targetQuantity: { type: integer }
        maxQuantity: { type: integer, nullable: true }
        deadline: { type: string, format: date-time }
        pickupDate: { type: string, format: date }
        pickupTimeStart: { type: string, format: time }
        pickupTimeEnd: { type: string, format: time }
        dDay: { type: integer }
        isWishlisted: { type: boolean }
        isClosed: { type: boolean }
        canParticipate: { type: boolean }

    ApiResponseGroupBuyFeedPage:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [content, totalElements, totalPages, number, size]
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/GroupBuyFeedItem'
            totalElements: { type: integer }
            totalPages: { type: integer }
            number: { type: integer }
            size: { type: integer }
        error: { nullable: true, example: null }

    ApiResponseGroupBuyDetail:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [id, storeName, region, productName, productDescription, notice, imageUrls, price, achievementRate, currentQuantity, targetQuantity, maxQuantity, deadline, pickupDate, pickupTimeStart, pickupTimeEnd, pickupLocation, pickupLatitude, pickupLongitude, dDay, isWishlisted, isClosed, isParticipated, canParticipate]
          properties:
            id: { type: integer, format: int64 }
            storeName: { type: string }
            region: { type: string }
            productName: { type: string }
            productDescription: { type: string }
            notice: { type: string, description: 유의사항 }
            imageUrls:
              type: array
              items: { type: string }
            price: { type: integer }
            achievementRate: { type: integer }
            currentQuantity: { type: integer }
            targetQuantity: { type: integer }
            maxQuantity: { type: integer, nullable: true }
            deadline: { type: string, format: date-time }
            pickupDate: { type: string, format: date }
            pickupTimeStart: { type: string, format: time }
            pickupTimeEnd: { type: string, format: time }
            pickupLocation: { type: string }
            pickupLatitude: { type: number, format: double, nullable: true }
            pickupLongitude: { type: number, format: double, nullable: true }
            dDay: { type: integer }
            isWishlisted: { type: boolean }
            isClosed: { type: boolean }
            isParticipated: { type: boolean }
            canParticipate: { type: boolean }
        error: { nullable: true, example: null }

    ApiResponseGroupBuyProgress:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [groupBuyId, achievementRate, currentQuantity, targetQuantity, isClosed]
          properties:
            groupBuyId: { type: integer, format: int64 }
            achievementRate: { type: integer }
            currentQuantity: { type: integer }
            targetQuantity: { type: integer }
            isClosed: { type: boolean }
        error: { nullable: true, example: null }

    GroupBuyProgressItem:
      type: object
      required: [groupBuyId, achievementRate, currentQuantity, targetQuantity, isClosed]
      properties:
        groupBuyId: { type: integer, format: int64 }
        achievementRate: { type: integer }
        currentQuantity: { type: integer }
        targetQuantity: { type: integer }
        isClosed: { type: boolean }

    ApiResponseGroupBuyProgressList:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            $ref: '#/components/schemas/GroupBuyProgressItem'
        error: { nullable: true, example: null }

    ApiResponseShareMeta:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [shareUrl, title, description, imageUrl, storeName, deadline, pickupDate, pickupTimeStart, pickupTimeEnd]
          properties:
            shareUrl: { type: string }
            title: { type: string }
            description: { type: string }
            imageUrl: { type: string }
            storeName: { type: string }
            deadline: { type: string, format: date-time }
            pickupDate: { type: string, format: date }
            pickupTimeStart: { type: string, format: time, nullable: true }
            pickupTimeEnd: { type: string, format: time, nullable: true }
        error: { nullable: true, example: null }

    # ── GroupBuyRequest ────────────────────────────────────────
    GroupBuyRequestCreate:
      type: object
      required: [storeName, productName, desiredQuantity, desiredPickupDate]
      properties:
        storeName:
          type: string
          maxLength: 100
        storeAddress:
          type: string
          maxLength: 200
          nullable: true
          description: 외부 지도 API로 선택한 매장 도로명 주소
        storeLatitude:
          type: number
          format: double
          nullable: true
        storeLongitude:
          type: number
          format: double
          nullable: true
        productName:
          type: string
          maxLength: 100
        desiredQuantity:
          type: integer
          minimum: 1
        desiredPickupDate:
          type: string
          format: date
          description: 오늘 이후 날짜
        additionalNote:
          type: string
          maxLength: 500
          nullable: true

    ApiResponseRequestId:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [requestId]
          properties:
            requestId: { type: integer, format: int64 }
        error: { nullable: true, example: null }

    GroupBuyRequestDetail:
      type: object
      required: [requestId, storeName, productName, desiredQuantity, desiredPickupDate, status, rejectionReason, createdAt]
      properties:
        requestId: { type: integer, format: int64 }
        storeName: { type: string }
        productName: { type: string }
        desiredQuantity: { type: integer }
        desiredPickupDate: { type: string, format: date }
        additionalNote: { type: string, nullable: true }
        status:
          type: string
          enum: [SUBMITTED, IN_REVIEW, IN_CONTACT, OPENED, REJECTED]
          description: |
            SUBMITTED=요청 접수 / IN_REVIEW=검토 중 / IN_CONTACT=매장 컨택 중 /
            OPENED=공구 개설 완료 / REJECTED=개설 불가
        rejectionReason: { type: string, nullable: true, description: status=REJECTED 시 노출 }
        createdAt: { type: string, format: date-time }

    ApiResponseGroupBuyRequestList:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            $ref: '#/components/schemas/GroupBuyRequestDetail'
        error: { nullable: true, example: null }

    ApiResponseGroupBuyRequestDetail:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/GroupBuyRequestDetail'
        error: { nullable: true, example: null }

    # ── Wishlist ───────────────────────────────────────────────
    ApiResponseWishlistPage:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [content, totalElements, totalPages, number, size, urgentCount]
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/GroupBuyFeedItem'
            totalElements: { type: integer }
            totalPages: { type: integer }
            number: { type: integer }
            size: { type: integer }
            urgentCount:
              type: integer
              description: 마감 24시간 이내 건수 (0이면 배너 미노출)
        error: { nullable: true, example: null }

    # ── Participation ──────────────────────────────────────────
    ParticipationCreate:
      type: object
      required: [quantity, agreedTerms]
      properties:
        quantity:
          type: integer
          minimum: 1
        agreedTerms:
          type: array
          items:
            type: string
            enum:
              - NO_CANCEL_AFTER_ACHIEVED
              - FULL_REFUND_BEFORE_ACHIEVED
              - NO_REFUND_IF_NOT_PICKED_UP
              - NO_WITHDRAWAL_RIGHT
          minItems: 4
          description: 4개 항목 모두 포함 필수

    ApiResponseParticipationCreated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [participationId, orderName, totalAmount, productAmount, feeAmount]
          properties:
            participationId: { type: integer, format: int64 }
            orderName: { type: string, description: "포트원 SDK에 전달할 주문명. 예) 두쫀쿠 오리지널 1개" }
