            type: array
            items:
              type: integer
              format: int64
              minimum: 1
            maxItems: 20
      responses:
        '200':
          description: 공구별 달성률 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyProgressList'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/group-buys/{groupBuyId}/share:
    get:
      tags: [GroupBuy]
      summary: 공유 메타데이터 조회
      description: SNS 공유용 딥링크 URL 및 카드 메타데이터를 반환한다.
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 공유 메타데이터
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseShareMeta'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/search:
    post:
      tags: [GroupBuy]
      summary: 검색 실행 및 AI 키워드 분석 (1.1.4-1)
      description: |
        검색어를 입력하면 동네/베이커리 키워드를 AI로 분석하고 최근 검색어로 저장한다.
        분석 결과에 따라 4가지 케이스로 분기한다.
        자체 검색 결과가 없을 때 제공되는 recommendedStores는 Naver Local Search 결과 중
        베이커리/디저트 도메인으로 분류된 매장만 반환한다.
        - case 1: 베이커리 인식, 동네 미인식
        - case 2: 동네 인식, 베이커리 미인식
        - case 3: 동네+베이커리 모두 인식
        - case 4: 모두 인식 불가
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keyword]
              properties:
                keyword:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: AI 분석 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSearchAnalysis'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/search/recent:
    get:
      tags: [GroupBuy]
      summary: 최근 검색어 목록 조회
      description: |
        검색창 탭 시 표시할 사용자의 최근 검색어를 최신순으로 반환한다. (1.1.4-10)
        동일 검색어는 중복 저장하지 않고 가장 최근 검색 위치로 이동한다.
        최근 검색어는 최대 10개까지 반환하며, 검색 이력이 없으면 빈 배열을 반환한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 최근 검색어 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRecentSearchList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [GroupBuy]
      summary: 최근 검색어 전체 삭제
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/search/recent/{keyword}:
    delete:
      tags: [GroupBuy]
      summary: 최근 검색어 단건 삭제
      security:
        - bearerAuth: []
      parameters:
        - name: keyword
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  # ─────────────────────────────────────────────────────────────
  # GroupBuyRequest (소비자)
  # ─────────────────────────────────────────────────────────────
  /api/v1/stores/search:
    get:
      tags: [GroupBuyRequest]
      summary: 매장 검색 자동완성 (2.1.1-1)
      description: |
        매장명 또는 주소 입력 시 외부 지도/장소 API 기반 매장 후보 목록을 반환한다.
        각 항목은 매장명과 주소를 함께 포함한다. 예: 모모양과 / 서울 성북구 화랑로11길 23
      parameters:
        - name: keyword
          in: query
          required: true
          description: 매장명 또는 주소 검색어
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 매장 후보 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreSearchList'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/group-buy-requests:
    post:
      tags: [GroupBuyRequest]
      summary: 공구 개설 요청 제출
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupBuyRequestCreate'
      responses:
        '201':
          description: 요청 접수 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRequestId'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [GroupBuyRequest]
      summary: 내 공구 요청 목록 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 요청 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyRequestList'

  /api/v1/group-buy-requests/{requestId}:
    get:
      tags: [GroupBuyRequest]
      summary: 공구 요청 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 요청 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyRequestDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/group-buy-open-requests:
    post:
      tags: [GroupBuyRequest]
      summary: 공구 개설 알림 신청
      description: |
        특정 지역/상품 조합으로 공구가 개설되면 알림을 받기 위해 등록한다.
        검색 결과가 비어 있을 때(EMPTY_CAN_REQUEST 상태) 진입 가능한 진입점이다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [region, productName]
              properties:
                region:
                  type: string
                  maxLength: 50
                  description: 알림 신청 대상 지역(동/구 등)
                productName:
                  type: string
                  maxLength: 100
                  description: 알림 신청 대상 상품명
      responses:
        '201':
          $ref: '#/components/responses/SuccessNoData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/group-buy-open-requests/store-recommendations:
    post:
      tags: [GroupBuyRequest]
      summary: 매장 추천 바텀시트용 네이버 Local Search 매장 후보 조회
      description: |
        1.1.4-9 매장 추천 바텀시트용 API.

        Case 1~4의 바텀시트에서 동네·상품 조건이 모두 확정된 후 CTA 버튼을 탭하면,
        백엔드는 네이버 Local Search API를 조회하여 해당 조건에 맞는 매장 후보를 검색한다.

        매장 후보는 최대 10개까지 반환하며, 추천 매장 후보는 다음 기준을 반영해 정렬한다.

        - 네이버 Local Search API의 기본 관련도 순서
        - 매장 주소가 선택한 동네와 일치하거나 포함되는지 여부
        - 매장 카테고리가 상품 조건과 관련 있는지 여부
        - 자사 DB에 등록된 매장인지 여부
        - 해당 매장의 과거 공구 이력이 있는지 여부

        네이버 결과가 0건이거나 네이버 API 호출 실패/timeout이 발생하면 `stores=[]`를 반환하며,
        프론트는 기존 공구 개설 요청 플로우로 fallback한다.

        중복 매장은 하나로 합쳐 반환하고, 매장명에 포함된 HTML 태그는 제거해서 반환한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRecommendationRequest'
      responses:
        '200':
          description: 추천 매장 후보 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreRecommendation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────────────────────
  # Wishlist
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buys/{groupBuyId}/wishlist:
    post:
      tags: [Wishlist]
      summary: 찜 추가
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '201':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Wishlist]
      summary: 찜 해제
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/wishlists:
    get:
      tags: [Wishlist]
      summary: 찜 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [ALL, CLOSING_SOON, OPEN]
            default: ALL
          description: ALL=전체 / CLOSING_SOON=마감임박(D-3) / OPEN=모집중
        - name: excludeClosed
          in: query
          schema:
            type: boolean
            default: false
          description: true면 마감 공고 제외, false면 마감 포함
        - name: sort
          in: query
          schema:
            type: string
            enum: [LATEST, DEADLINE]
            default: LATEST
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 찜 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWishlistPage'

  # ─────────────────────────────────────────────────────────────
  # Participation & Payment
  # ─────────────────────────────────────────────────────────────
  /api/v1/admin/summary:
    get:
      tags: [Admin]
      summary: 운영자 대시보드 요약 정보
      description: 헤더에 항상 노출되는 대기중 요청 / 진행 중 공구 / 달성률 / 대기 환불 요약을 반환한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 대시보드 요약
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminDashboardSummary'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/group-buys/{groupBuyId}/checkout:
    get:
      tags: [Participation]
      summary: 참여하기 화면 결제 정보 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
