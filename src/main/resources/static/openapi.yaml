          description: 정산 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettlementId'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/admin/settlements/{settlementId}/release:
    post:
      tags: [Admin]
      summary: 에스크로 해제
      security:
        - bearerAuth: []
      parameters:
        - name: settlementId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

# ─────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupBuyId:
      name: groupBuyId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ParticipationId:
      name: participationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    SuccessNoData:
      description: 성공 (데이터 없음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseEmpty'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Conflict:
      description: 상태 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    TooManyRequests:
      description: 요청 횟수 초과
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'

  schemas:

    # ── 공통 응답 래퍼 ──────────────────────────────────────────
    ApiResponseEmpty:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data: { nullable: true, example: null }
        error: { nullable: true, example: null }

    ApiResponseError:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: false }
        data: { nullable: true, example: null }
        error:
          type: object
          required: [code, message, detail]
          properties:
            code: { type: string, example: GROUPBUY_NOT_FOUND }
            message: { type: string, example: 존재하지 않는 공구입니다 }
            detail: { type: string, nullable: true }

    # ── Auth ───────────────────────────────────────────────────
    KakaoLoginRequest:
      type: object
      required: [authorizationCode]
      properties:
        authorizationCode:
          type: string
          description: 카카오 인가 코드
        redirectUri:
          type: string
          nullable: true
          description: 카카오 인가 요청 시 사용한 redirect URI (서버 검증용)

    ApiResponseAuthLogin:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [accessToken, tokenType, expiresIn, isNewUser, user]
          properties:
            accessToken: { type: string }
            tokenType: { type: string, example: Bearer }
            expiresIn: { type: integer, format: int64, description: Access Token 만료 시간(초) }
            isNewUser: { type: boolean, description: 최초 가입 여부 }
            user:
              $ref: '#/components/schemas/AuthUser'
        error: { nullable: true, example: null }

    ApiResponseAccessToken:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [accessToken, tokenType, expiresIn]
          properties:
            accessToken: { type: string }
            tokenType: { type: string, example: Bearer }
            expiresIn: { type: integer, format: int64, description: Access Token 만료 시간(초) }
        error: { nullable: true, example: null }

    ApiResponseUserInfo:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/AuthUser'
        error: { nullable: true, example: null }

    AdditionalInfoUpsertRequest:
      type: object
      required: [nickname, phoneNumber]
      properties:
        nickname:
          type: string
          description: 2~10자, 한글/영문/숫자만 허용
          minLength: 2
          maxLength: 10
          pattern: "^[A-Za-z0-9가-힣]{2,10}$"
        phoneNumber:
          type: string
          description: 하이픈 포함 휴대폰 번호 (01X-XXXX-XXXX)
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    WithdrawRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
          description: 탈퇴 사유(선택)
          enum: [TIME_NOT_AVAILABLE, NO_LONGER_INTERESTED, PREFER_DIRECT_VISIT, BUYING_ELSEWHERE, OTHER]
        reasonDetail:
          type: string
          nullable: true
          maxLength: 500
          description: 탈퇴 상세 사유 (reason=OTHER 일 때 입력)

    ApiResponseNicknameAvailability:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [nickname, available]
          properties:
            nickname: { type: string, example: 뭉치장123 }
            available: { type: boolean, example: true }
        error: { nullable: true, example: null }

    ApiResponseAdditionalInfoUpdated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [id, nickname, phoneNumber, signupCompleted]
          properties:
            id: { type: integer, format: int64 }
            nickname: { type: string }
            phoneNumber: { type: string }
            signupCompleted: { type: boolean, example: true }
        error: { nullable: true, example: null }

    BusinessRegistrationLookupRequest:
      type: object
      required: [businessRegistrationNumber]
      properties:
        businessRegistrationNumber:
          type: string
          description: 사업자등록번호(하이픈 포함/미포함 모두 허용)
          pattern: "^\\d{3}-?\\d{2}-?\\d{5}$"
          example: "111-22-33333"

    ApiResponseBusinessRegistrationLookup:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [businessRegistrationNumber, status]
          properties:
            businessRegistrationNumber: { type: string, example: "111-22-33333" }
            status:
              type: string
              enum: [VALID, CLOSED, NOT_FOUND]
              example: VALID
            message:
              type: string
              nullable: true
              example: "사업자등록번호가 조회되지 않아 다시 입력해주세요."
            storeName:
              type: string
              nullable: true
            ownerName:
              type: string
              nullable: true
            storeAddress:
              type: string
              nullable: true
        error: { nullable: true, example: null }

    SellerBusinessInfoUpsertRequest:
      type: object
      required: [businessRegistrationNumber, storeName, ownerName, storeAddress, phoneNumber]
      properties:
        businessRegistrationNumber:
          type: string
          pattern: "^\\d{3}-?\\d{2}-?\\d{5}$"
          example: "111-22-33333"
        storeName:
          type: string
          maxLength: 100
          example: "뭉치장베이커리"
        ownerName:
          type: string
          maxLength: 50
          example: "홍길동"
        storeAddress:
          type: string
          maxLength: 255
          example: "서울시 강남구 테헤란로 123, 2층"
        phoneNumber:
