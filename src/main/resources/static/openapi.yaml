openapi: 3.0.3

info:
  title: 뭉치장 API
  description: |
    유행 음식 공동구매 플랫폼 뭉치장의 API 명세입니다.

    ## 인증
    로그인이 필요한 API는 `Authorization: Bearer {accessToken}` 헤더를 포함해야 합니다.

    ## 공통 응답 형식
    모든 응답은 아래 구조를 따릅니다.
    ```json
    { "success": true, "data": { ... }, "error": null }
    { "success": false, "data": null, "error": { "code": "ERROR_CODE", "message": "설명", "detail": "상세" } }
    ```
  version: v1

servers:
  - url: http://43.203.191.30/dev
    description: 개발 서버
  - url: http://localhost:8080
    description: 로컬 서버

tags:
  - name: Auth
    description: 카카오 로그인 및 토큰 관리
  - name: GroupBuy
    description: 공구 피드 · 상세 · 달성률
  - name: GroupBuyRequest
    description: 공구 개설 요청 (소비자)
  - name: Wishlist
    description: 찜 추가 · 해제 · 목록
  - name: Participation
    description: 공구 참여 · 결제 · 취소 · 환불
  - name: Pickup
    description: 픽업 안내 · QR 코드
  - name: Notification
    description: 알림 목록 · 읽음 처리
  - name: MyPage
    description: 마이페이지 (참여중 · 완료 · 환불 · 요청 내역)
  - name: Owner
    description: 사장님 전용 (QR 스캔 · 홈 · 예약 목록)
  - name: Admin
    description: 운영자 전용 (공구요청 · 공구관리 · 환불 · 정산)

paths:

  # ─────────────────────────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────────────────────────
  /api/v1/auth/kakao:
    post:
      tags: [Auth]
      summary: 카카오 로그인 / 회원가입
      description: 카카오 인가 코드로 로그인하거나 최초 가입 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [authorizationCode]
              properties:
                authorizationCode:
                  type: string
                  description: 카카오 인가 코드
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthToken'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Access Token 갱신
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: Refresh Token을 무효화한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/users/me:
    get:
      tags: [Auth]
      summary: 내 정보 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserInfo'
    delete:
      tags: [Auth]
      summary: 회원 탈퇴
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  # ─────────────────────────────────────────────────────────────
  # GroupBuy
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buys:
    get:
      tags: [GroupBuy]
      summary: 공구 피드 목록 조회
      description: 진행 중인 공구 목록을 페이지네이션으로 조회한다. 비로그인 허용.
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [ALL, CLOSING_SOON, ALMOST_ACHIEVED, SEOUL, GYEONGGI]
            default: ALL
        - name: keyword
          in: query
          description: 매장명 또는 상품명 검색어
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 공구 피드 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyFeedPage'

  /api/v1/group-buys/{groupBuyId}:
    get:
      tags: [GroupBuy]
      summary: 공구 상세 조회
      description: 공구의 매장·상품·달성률·픽업 정보를 조회한다. 비로그인 허용.
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 공구 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/group-buys/{groupBuyId}/progress:
    get:
      tags: [GroupBuy]
      summary: 단일 공구 달성률 조회 (폴링용)
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 달성률
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyProgress'

  /api/v1/group-buys/progress:
    get:
      tags: [GroupBuy]
      summary: 다건 공구 달성률 조회 (피드 갱신용)
      parameters:
        - name: ids
          in: query
          required: true
          description: 조회할 공구 ID 목록 (최대 20개)
          schema:
            type: array
            items:
              type: integer
              format: int64
            maxItems: 20
      responses:
        '200':
          description: 공구별 달성률 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyProgressList'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/group-buys/{groupBuyId}/share:
    get:
      tags: [GroupBuy]
      summary: 공유 메타데이터 조회
      description: SNS 공유용 딥링크 URL 및 카드 메타데이터를 반환한다.
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 공유 메타데이터
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseShareMeta'

  # ─────────────────────────────────────────────────────────────
  # GroupBuyRequest (소비자)
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buy-requests:
    post:
      tags: [GroupBuyRequest]
      summary: 공구 개설 요청 제출
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupBuyRequestCreate'
      responses:
        '201':
          description: 요청 접수 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRequestId'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [GroupBuyRequest]
      summary: 내 공구 요청 목록 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 요청 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyRequestList'

  /api/v1/group-buy-requests/{requestId}:
    get:
      tags: [GroupBuyRequest]
      summary: 공구 요청 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 요청 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyRequestDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────────────────────
  # Wishlist
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buys/{groupBuyId}/wishlist:
    post:
      tags: [Wishlist]
      summary: 찜 추가
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '201':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Wishlist]
      summary: 찜 해제
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/wishlists:
    get:
      tags: [Wishlist]
      summary: 찜 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [ALL, CLOSING_SOON, OPEN, CLOSED]
            default: ALL
          description: ALL=전체 / CLOSING_SOON=마감임박(D-3) / OPEN=모집중 / CLOSED=마감공구
        - name: sort
          in: query
          schema:
            type: string
            enum: [LATEST, DEADLINE]
            default: LATEST
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 찜 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWishlistPage'

  # ─────────────────────────────────────────────────────────────
  # Participation & Payment
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buys/{groupBuyId}/participations:
    post:
      tags: [Participation]
      summary: 공구 참여 (결제 요청 생성)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipationCreate'
      responses:
        '201':
          description: 참여 생성 및 결제 정보 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseParticipationCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/payments/confirm:
    post:
      tags: [Participation]
      summary: PG 결제 성공 콜백 처리
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentConfirm'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/payments/fail:
    post:
      tags: [Participation]
      summary: PG 결제 실패 콜백 처리
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentFail'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/participations/{participationId}/cancel:
    post:
      tags: [Participation]
      summary: 참여 취소 (달성 전 이탈)
      description: 공구 달성 전에만 취소 가능하며 결제 금액이 자동 환불된다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ParticipationId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/refunds:
    get:
      tags: [Participation]
      summary: 내 환불 내역 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 환불 내역 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRefundList'

  # ─────────────────────────────────────────────────────────────
  # Pickup & QR
  # ─────────────────────────────────────────────────────────────
  /api/v1/participations/{participationId}/pickup:
    get:
      tags: [Pickup]
      summary: 픽업 안내 정보 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ParticipationId'
      responses:
        '200':
          description: 픽업 안내 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePickupInfo'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/participations/{participationId}/qr:
    get:
      tags: [Pickup]
      summary: QR 픽업 코드 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ParticipationId'
      responses:
        '200':
          description: QR 코드 데이터
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseQrCode'

  /api/v1/pickups/{qrCode}/verify:
    post:
      tags: [Pickup]
      summary: QR 코드 스캔 검증 및 수령 처리
      description: 소비자 QR을 매장(사장님)이 스캔하면 대기 → 완료로 자동 전환된다.
      security:
        - bearerAuth: []
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 수령 처리 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePickupVerify'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  # ─────────────────────────────────────────────────────────────
  # Notification
  # ─────────────────────────────────────────────────────────────
  /api/v1/notifications:
    get:
      tags: [Notification]
      summary: 알림 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [ALL, WISHLIST, PARTICIPATION, PICKUP, REQUEST]
            default: ALL
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 알림 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNotificationPage'

  /api/v1/notifications/unread-count:
    get:
      tags: [Notification]
      summary: 미읽음 알림 개수 조회 (탭바 배지용)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 미읽음 개수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUnreadCount'

  /api/v1/notifications/read-all:
    patch:
      tags: [Notification]
      summary: 전체 알림 읽음 처리
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/notifications/{notificationId}/read:
    patch:
      tags: [Notification]
      summary: 개별 알림 읽음 처리
      security:
        - bearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  # ─────────────────────────────────────────────────────────────
  # MyPage
  # ─────────────────────────────────────────────────────────────
  /api/v1/users/me/participations:
    get:
      tags: [MyPage]
      summary: 참여 목록 조회 (참여중 · 완료 · 환불 탭)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED, REFUNDED]
            default: ACTIVE
          description: ACTIVE=참여중 / COMPLETED=완료 / REFUNDED=환불내역
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 참여 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseParticipationPage'

  /api/v1/users/me/group-buy-requests:
    get:
      tags: [MyPage]
      summary: 내 공구 요청 목록 조회 (개설 요청 내역 탭)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 개설 요청 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyRequestList'

  /api/v1/users/me/tabs/counts:
    get:
      tags: [MyPage]
      summary: 마이페이지 탭별 건수 조회
      description: 참여중 · 완료 · 환불내역 · 개설요청 건수를 반환한다 (탭 칩 괄호 숫자용).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 탭별 건수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTabCounts'

  # ─────────────────────────────────────────────────────────────
  # Owner
  # ─────────────────────────────────────────────────────────────
  /api/v1/owner/home/summary:
    get:
      tags: [Owner]
      summary: 사장님 홈 요약 정보
      description: 픽업 대기/완료 건수, 진행 중 공구 수, 다음 픽업 시간을 반환한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 홈 요약
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOwnerSummary'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/owner/home/pickup-schedule:
    get:
      tags: [Owner]
      summary: 시간대별 픽업 현황 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 시간대별 현황
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePickupScheduleList'

  /api/v1/owner/group-buys:
    get:
      tags: [Owner]
      summary: 진행 중인 공구 목록 조회 (사장님용)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 진행 중 공구 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOwnerGroupBuyList'

  /api/v1/owner/reservations:
    get:
      tags: [Owner]
      summary: 픽업 예약자 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ALL, WAITING, COMPLETED]
            default: ALL
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 예약자 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReservationPage'

  /api/v1/owner/reservations/{participationId}/complete:
    patch:
      tags: [Owner]
      summary: 수령 처리 (수동)
      description: QR 없이 수동으로 수령 완료 처리한다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ParticipationId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

  # ─────────────────────────────────────────────────────────────
  # Admin
  # ─────────────────────────────────────────────────────────────
  /api/v1/admin/group-buy-requests:
    get:
      tags: [Admin]
      summary: 공구 요청 목록 조회 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ALL, IN_REVIEW, IN_CONTACT, OPENED, REJECTED]
            default: ALL
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 공구 요청 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminRequestPage'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/group-buy-requests/{requestId}:
    get:
      tags: [Admin]
      summary: 공구 요청 상세 조회 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 요청 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminRequestDetail'

  /api/v1/admin/group-buy-requests/{requestId}/status:
    patch:
      tags: [Admin]
      summary: 공구 요청 상태 변경
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRequestStatusUpdate'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/admin/group-buys:
    get:
      tags: [Admin]
      summary: 진행 중인 공구 현황 목록 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ALL, IN_PROGRESS, ACHIEVED]
            default: ALL
      responses:
        '200':
          description: 공구 현황 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminGroupBuyList'
    post:
      tags: [Admin]
      summary: 공구 개설 (운영자)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminGroupBuyCreate'
      responses:
        '201':
          description: 공구 개설 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyId'

  /api/v1/admin/group-buys/{groupBuyId}:
    get:
      tags: [Admin]
      summary: 공구 상세 조회 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 공구 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminGroupBuyDetail'
    patch:
      tags: [Admin]
      summary: 공구 정보 수정 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminGroupBuyUpdate'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/admin/group-buys/{groupBuyId}/order-confirm:
    post:
      tags: [Admin]
      summary: 발주 확정 처리
      description: ACHIEVED 상태 공구에 대해 발주를 확정한다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/admin/group-buys/{groupBuyId}/order-sheet:
    post:
      tags: [Admin]
      summary: 발주서 발송
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/admin/refunds:
    get:
      tags: [Admin]
      summary: 환불 처리 현황 목록 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ALL, WAITING, COMPLETED]
            default: ALL
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 환불 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminRefundPage'

  /api/v1/admin/refunds/{participationId}/manual:
    post:
      tags: [Admin]
      summary: 수동 환불 처리
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ParticipationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminManualRefund'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/admin/settlements:
    get:
      tags: [Admin]
      summary: 정산 내역 목록 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - name: escrowStatus
          in: query
          schema:
            type: string
            enum: [ALL, HOLDING, RELEASED]
            default: ALL
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 정산 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettlementPage'
    post:
      tags: [Admin]
      summary: 정산 생성 및 처리
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettlementCreate'
      responses:
        '201':
          description: 정산 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettlementId'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/admin/settlements/{settlementId}/release:
    post:
      tags: [Admin]
      summary: 에스크로 해제
      security:
        - bearerAuth: []
      parameters:
        - name: settlementId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

# ─────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupBuyId:
      name: groupBuyId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ParticipationId:
      name: participationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    SuccessNoData:
      description: 성공 (데이터 없음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseEmpty'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Conflict:
      description: 상태 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'

  schemas:

    # ── 공통 응답 래퍼 ──────────────────────────────────────────
    ApiResponseEmpty:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { nullable: true, example: null }
        error: { nullable: true, example: null }

    ApiResponseError:
      type: object
      properties:
        success: { type: boolean, example: false }
        data: { nullable: true, example: null }
        error:
          type: object
          properties:
            code: { type: string, example: GROUPBUY_NOT_FOUND }
            message: { type: string, example: 존재하지 않는 공구입니다 }
            detail: { type: string, nullable: true }

    # ── Auth ───────────────────────────────────────────────────
    ApiResponseAuthToken:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            accessToken: { type: string }
            refreshToken: { type: string }
            isNewUser: { type: boolean, description: 최초 가입 여부 }
        error: { nullable: true, example: null }

    ApiResponseUserInfo:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            id: { type: integer, format: int64 }
            nickname: { type: string }
            profileImageUrl: { type: string, nullable: true }
        error: { nullable: true, example: null }

    # ── GroupBuy ───────────────────────────────────────────────
    GroupBuyFeedItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        storeName: { type: string }
        region: { type: string }
        productName: { type: string }
        thumbnailUrl: { type: string }
        price: { type: integer }
        achievementRate: { type: integer, description: 달성률 % }
        currentQuantity: { type: integer }
        targetQuantity: { type: integer }
        maxQuantity: { type: integer, nullable: true }
        deadline: { type: string, format: date-time }
        pickupDate: { type: string, format: date }
        pickupStartAt: { type: string, format: date-time }
        pickupEndAt: { type: string, format: date-time }
        dDay: { type: integer }
        isWishlisted: { type: boolean }
        isClosed: { type: boolean }
        canParticipate: { type: boolean }

    ApiResponseGroupBuyFeedPage:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/GroupBuyFeedItem'
            totalElements: { type: integer }
            totalPages: { type: integer }
            number: { type: integer }
            size: { type: integer }
        error: { nullable: true, example: null }

    ApiResponseGroupBuyDetail:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            id: { type: integer, format: int64 }
            storeName: { type: string }
            region: { type: string }
            productName: { type: string }
            productDescription: { type: string }
            notice: { type: string, description: 유의사항 }
            imageUrls:
              type: array
              items: { type: string }
            price: { type: integer }
            achievementRate: { type: integer }
            currentQuantity: { type: integer }
            targetQuantity: { type: integer }
            maxQuantity: { type: integer, nullable: true }
            deadline: { type: string, format: date-time }
            pickupDate: { type: string, format: date }
            pickupStartAt: { type: string, format: date-time }
            pickupEndAt: { type: string, format: date-time }
            pickupLocation: { type: string }
            pickupLatitude: { type: number, format: double, nullable: true }
            pickupLongitude: { type: number, format: double, nullable: true }
            dDay: { type: integer }
            isWishlisted: { type: boolean }
            isClosed: { type: boolean }
            isParticipated: { type: boolean }
            canParticipate: { type: boolean }
        error: { nullable: true, example: null }

    ApiResponseGroupBuyProgress:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            groupBuyId: { type: integer, format: int64 }
            achievementRate: { type: integer }
            currentQuantity: { type: integer }
            targetQuantity: { type: integer }
            isClosed: { type: boolean }
        error: { nullable: true, example: null }

    GroupBuyProgressItem:
      type: object
      properties:
        groupBuyId: { type: integer, format: int64 }
        achievementRate: { type: integer }
        currentQuantity: { type: integer }
        targetQuantity: { type: integer }
        isClosed: { type: boolean }

    ApiResponseGroupBuyProgressList:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            $ref: '#/components/schemas/GroupBuyProgressItem'
        error: { nullable: true, example: null }

    ApiResponseShareMeta:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            shareUrl: { type: string }
            title: { type: string }
            description: { type: string }
            imageUrl: { type: string }
            storeName: { type: string }
            deadline: { type: string, format: date-time }
            pickupDate: { type: string, format: date }
            pickupStartAt: { type: string, format: date-time, nullable: true }
            pickupEndAt: { type: string, format: date-time, nullable: true }
        error: { nullable: true, example: null }

    # ── GroupBuyRequest ────────────────────────────────────────
    GroupBuyRequestCreate:
      type: object
      required: [storeName, productName, desiredQuantity, desiredPickupDate]
      properties:
        storeName:
          type: string
          maxLength: 100
        productName:
          type: string
          maxLength: 100
        desiredQuantity:
          type: integer
          minimum: 1
        desiredPickupDate:
          type: string
          format: date
          description: 오늘 이후 날짜
        additionalNote:
          type: string
          maxLength: 500
          nullable: true

    ApiResponseRequestId:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            requestId: { type: integer, format: int64 }
        error: { nullable: true, example: null }

    GroupBuyRequestDetail:
      type: object
      properties:
        requestId: { type: integer, format: int64 }
        storeName: { type: string }
        productName: { type: string }
        desiredQuantity: { type: integer }
        desiredPickupDate: { type: string, format: date }
        additionalNote: { type: string, nullable: true }
        status:
          type: string
          enum: [SUBMITTED, REVIEWING, CONTACTING, OPENED, REJECTED]
        rejectionReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    ApiResponseGroupBuyRequestList:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            $ref: '#/components/schemas/GroupBuyRequestDetail'
        error: { nullable: true, example: null }

    ApiResponseGroupBuyRequestDetail:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/GroupBuyRequestDetail'
        error: { nullable: true, example: null }

    # ── Wishlist ───────────────────────────────────────────────
    ApiResponseWishlistPage:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/GroupBuyFeedItem'
            totalElements: { type: integer }
            totalPages: { type: integer }
            number: { type: integer }
            size: { type: integer }
            urgentCount:
              type: integer
              description: 마감 24시간 이내 건수 (0이면 배너 미노출)
        error: { nullable: true, example: null }

    # ── Participation ──────────────────────────────────────────
    ParticipationCreate:
      type: object
      required: [quantity, agreedTerms]
      properties:
        quantity:
          type: integer
          minimum: 1
        agreedTerms:
          type: array
          items:
            type: string
            enum:
              - NO_CANCEL_AFTER_ACHIEVED
              - FULL_REFUND_BEFORE_ACHIEVED
              - NO_REFUND_IF_NOT_PICKED_UP
              - NO_WITHDRAWAL_RIGHT
          minItems: 4
          description: 4개 항목 모두 포함 필수

    ApiResponseParticipationCreated:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            participationId: { type: integer, format: int64 }
            paymentKey: { type: string }
            totalAmount: { type: integer, description: 상품금액 + 수수료(30%) }
            productAmount: { type: integer }
            feeAmount: { type: integer }
        error: { nullable: true, example: null }

    PaymentConfirm:
      type: object
      required: [paymentKey, participationId, amount]
      properties:
        paymentKey: { type: string }
        participationId: { type: integer, format: int64 }
        amount: { type: integer }

    PaymentFail:
      type: object
      properties:
        paymentKey: { type: string }
        participationId: { type: integer, format: int64 }
        errorCode: { type: string }

    ApiResponseRefundList:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            type: object
            properties:
              participationId: { type: integer, format: int64 }
              productName: { type: string }
              storeName: { type: string }
              paymentAmount: { type: integer }
              quantity: { type: integer }
              refundStatus:
                type: string
                enum: [PENDING, COMPLETED]
              cancelReason: { type: string }
        error: { nullable: true, example: null }

    # ── Pickup & QR ────────────────────────────────────────────
    ApiResponsePickupInfo:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            participationId: { type: integer, format: int64 }
            storeName: { type: string }
            storePhone: { type: string }
            storeAddress: { type: string }
            latitude: { type: number, format: double }
            longitude: { type: number, format: double }
            pickupDate: { type: string, format: date }
            pickupTimeStart: { type: string, format: time }
            pickupTimeEnd: { type: string, format: time }
            productName: { type: string }
            quantity: { type: integer }
            remainingMinutes: { type: integer, nullable: true, description: 픽업 종료까지 남은 분 (당일만) }
        error: { nullable: true, example: null }

    ApiResponseQrCode:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            qrCode: { type: string, format: uuid }
            nickname: { type: string }
            productName: { type: string }
            quantity: { type: integer }
            isUsed: { type: boolean }
            storeName: { type: string }
            pickupDateTime: { type: string, format: date-time }
        error: { nullable: true, example: null }

    ApiResponsePickupVerify:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            participationId: { type: integer, format: int64 }
            userName: { type: string }
            productName: { type: string }
            quantity: { type: integer }
            pickupDateTime: { type: string, format: date-time }
            pickupStatus:
              type: string
              enum: [WAITING, COMPLETED]
        error: { nullable: true, example: null }

    # ── Notification ───────────────────────────────────────────
    NotificationItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        category:
          type: string
          enum: [WISHLIST, PARTICIPATION, PICKUP, REQUEST]
        type:
          type: string
          enum:
            - PICKUP_TODAY
            - PICKUP_TOMORROW
            - PICKUP_NOT_CONFIRMED
            - WISHLIST_DEADLINE_D3
            - WISHLIST_DEADLINE_D1
            - WISHLIST_TARGET_ACHIEVED
            - PARTICIPATION_CONFIRMED
            - GROUP_BUY_ACHIEVED
            - GROUP_BUY_FAILED
            - REQUEST_OPENED
            - REQUEST_REJECTED
            - REQUEST_NEW_PARTICIPANT
            - REQUEST_TARGET_ACHIEVED
            - REQUEST_DEADLINE_D3
        title:
          type: string
        body:
          type: string
        targetType:
          type: string
          enum: [GROUP_BUY, GROUP_BUY_REQUEST, PARTICIPATION]
          nullable: true
        targetId:
          type: integer
          format: int64
          nullable: true
        isRead:
          type: boolean
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    NotificationPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NotificationItem'
        totalElements:
          type: integer
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer

    ApiResponseNotificationPage:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/NotificationPage'
        error: { nullable: true, example: null }

    ApiResponseUnreadCount:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            count: { type: integer }
        error: { nullable: true, example: null }

    # ── MyPage ─────────────────────────────────────────────────
    ApiResponseParticipationPage:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            content:
              type: array
              items:
                type: object
                properties:
                  participationId: { type: integer, format: int64 }
                  productName: { type: string }
                  storeName: { type: string }
                  pickupDateTime: { type: string, format: date-time, nullable: true }
                  paymentAmount: { type: integer }
                  quantity: { type: integer }
                  achievementRate: { type: integer }
                  achievementStatus:
                    type: string
                    enum: [BEFORE_ACHIEVED, ACHIEVED]
                  dDay: { type: integer }
                  groupBuyId: { type: integer, format: int64 }
                  canCancel: { type: boolean }
                  canViewPickup: { type: boolean }
                  canViewQr: { type: boolean }
            totalElements: { type: integer }
            totalPages: { type: integer }
        error: { nullable: true, example: null }

    ApiResponseTabCounts:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            activeCount: { type: integer, description: 참여중 }
            completedCount: { type: integer, description: 완료 }
            refundedCount: { type: integer, description: 환불내역 }
            requestCount: { type: integer, description: 개설 요청 내역 }
        error: { nullable: true, example: null }

    # ── Owner ──────────────────────────────────────────────────
    ApiResponseOwnerSummary:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            pickupWaitingCount: { type: integer }
            pickupCompletedCount: { type: integer }
            activeGroupBuyCount: { type: integer }
            nextPickupTime: { type: string, format: time, nullable: true }
        error: { nullable: true, example: null }

    ApiResponsePickupScheduleList:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
