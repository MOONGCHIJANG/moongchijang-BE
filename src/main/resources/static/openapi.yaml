  /api/v1/payments/portone/webhook:
    post:
      tags: [Participation]
      summary: PortOne 결제 웹훅 수신
      description: 웹훅 signature를 검증한 뒤, 본문만 신뢰하지 않고 서버에서 PortOne 결제 단건 조회 후 상태를 동기화한다. signature 검증이 활성화된 환경에서는 PORTONE_WEBHOOK_SECRET과 웹훅 헤더가 필요하다.
      parameters:
        - name: webhook-id
          in: header
          required: false
          schema:
            type: string
          description: PortOne 웹훅 메시지 ID. signature 검증이 활성화된 환경에서 필요하다.
        - name: webhook-timestamp
          in: header
          required: false
          schema:
            type: string
          description: PortOne 웹훅 signature 생성 기준 시각. signature 검증이 활성화된 환경에서 필요하다.
        - name: webhook-signature
          in: header
          required: false
          schema:
            type: string
          description: PortOne 웹훅 signature. signature 검증이 활성화된 환경에서 필요하다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortOneWebhook'
      responses:
        '200':
          description: 웹훅 수신 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePortOneWebhook'

