    ApiResponseWishlistPage:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [content, totalElements, totalPages, number, size, urgentCount]
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/WishlistItemResponse'
            totalElements: { type: integer }
            totalPages: { type: integer }
            number: { type: integer }
            size: { type: integer }
            urgentCount:
              type: integer
              description: 마감 24시간 이내 건수 (0이면 배너 미노출)
        error: { nullable: true, example: null }

    # ── Participation ──────────────────────────────────────────
    ParticipationCreate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1

    ApiResponseParticipationCreated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [participationId, orderName, totalAmount, productAmount, feeAmount]
          properties:
            participationId: { type: integer, format: int64 }
            orderName: { type: string, description: "포트원 SDK에 전달할 주문명. 예) 두쫀쿠 오리지널 1개" }
            totalAmount: { type: integer, description: "상품금액 + 수수료(현재 정책상 0원) — 포트원 SDK totalAmount에 사용" }
            productAmount: { type: integer }
            feeAmount: { type: integer, description: "현재 정책: 0원" }
        error: { nullable: true, example: null }

    PaymentConfirm:
      type: object
      required: [paymentId, amount]
      description: |
        포트원 v2 + 토스페이먼츠 결제 성공 후 서버 검증 요청.
        클라이언트가 PortOne.requestPayment() 완료 시 반환된 paymentId를 전달한다.
        서버는 포트원 API(GET /payments/{paymentId})로 위변조 검증 후 확정 처리한다.
      properties:
        paymentId:
          type: string
          description: 서버가 결제 주문 생성 시 반환한 PortOne paymentId
        amount: { type: integer, description: 결제 요청 금액 — 서버 저장값과 불일치 시 위변조로 처리 }

    PaymentOrderCreate:
      type: object
      required: [quantity, agreedNoCancelAfterGoal, agreedRefundBeforeGoal, agreedNoRefundAfterNoShow, agreedNoWithdrawal]
      properties:
        quantity: { type: integer, minimum: 1 }
        agreedNoCancelAfterGoal: { type: boolean, description: 달성 후 취소 불가 동의 }
        agreedRefundBeforeGoal: { type: boolean, description: 달성 전 이탈 시 전액 환불 동의 }
        agreedNoRefundAfterNoShow: { type: boolean, description: 미수령 환불 불가 동의 }
        agreedNoWithdrawal: { type: boolean, description: 청약철회 불가 동의 }

