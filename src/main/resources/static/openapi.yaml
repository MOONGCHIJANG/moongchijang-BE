        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [GroupBuyRequest]
      summary: 내 공구 요청 목록 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 요청 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyRequestList'

