    post:
      tags: [GroupBuyRequest]
      summary: 공구 개설 요청 제출
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupBuyRequestCreate'
      responses:
        '201':
          description: 요청 접수 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRequestId'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [GroupBuyRequest]
      summary: 내 공구 요청 목록 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 요청 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyRequestList'

  /api/v1/group-buy-requests/{requestId}:
    get:
      tags: [GroupBuyRequest]
      summary: 공구 요청 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 요청 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyRequestDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/group-buy-open-requests/store-recommendations:
    post:
      tags: [GroupBuyRequest]
      summary: AI 매장 추천 바텀시트용 매장 후보 조회
      description: |
        동네와 상품 조건이 확정된 뒤 네이버 Local Search API와 자사 공구 이력을 기반으로
        최대 10개의 매장 후보를 추천한다.

        네이버 결과가 0건이거나 네이버 API 호출 실패/timeout이 발생하면 `stores=[]`를 반환하며,
        프론트는 기존 공구 개설 요청 플로우로 fallback한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRecommendationRequest'
      responses:
        '200':
          description: 추천 매장 후보 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStoreRecommendation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────────────────────
  # Wishlist
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buys/{groupBuyId}/wishlist:
    post:
      tags: [Wishlist]
