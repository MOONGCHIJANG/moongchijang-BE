openapi: 3.0.3

info:
  title: 뭉치장 API
  description: |
    유행 음식 공동구매 플랫폼 뭉치장의 API 명세입니다.

    ## 인증
    로그인이 필요한 API는 `Authorization: Bearer {accessToken}` 헤더를 포함해야 합니다.

    ## 공통 응답 형식
    모든 응답은 아래 구조를 따릅니다.
    ```json
    { "success": true, "data": { ... }, "error": null }
    { "success": false, "data": null, "error": { "code": "ERROR_CODE", "message": "설명", "detail": "상세" } }
    ```
  version: v1

servers:
  - url: http://43.203.191.30/dev
    description: 개발 서버
  - url: http://localhost:8080
    description: 로컬 서버

tags:
  - name: Auth
    description: 카카오 로그인 및 토큰 관리
  - name: GroupBuy
    description: 공구 피드 · 상세 · 달성률
  - name: GroupBuyRequest
    description: 공구 개설 요청 (소비자)
  - name: Wishlist
    description: 찜 추가 · 해제 · 목록
  - name: Participation
    description: 공구 참여 · 결제 · 취소 · 환불
  - name: Pickup
    description: 픽업 안내 · QR 코드
  - name: Notification
    description: 알림 목록 · 읽음 처리
  - name: MyPage
    description: 마이페이지 (참여중 · 완료 · 환불 · 요청 내역)
  - name: Owner
    description: 사장님 전용 (QR 스캔 · 홈 · 예약 목록)
  - name: Admin
    description: 운영자 전용 (공구요청 · 공구관리 · 환불 · 정산)

paths:

  # ─────────────────────────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────────────────────────
  /api/v1/auth/kakao:
    post:
      tags: [Auth]
      summary: 카카오 로그인 / 회원가입
      description: 카카오 인가 코드로 로그인하거나 최초 가입 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KakaoLoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: refreshToken HttpOnly 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthLogin'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Access Token 갱신
      description: HttpOnly 쿠키의 refreshToken을 검증해 Access Token을 재발급한다.
      responses:
        '200':
          description: 토큰 갱신 성공
          headers:
            Set-Cookie:
              description: refreshToken rotation 시 신규 refreshToken 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAccessToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: Refresh Token을 무효화한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/users/me:
    get:
      tags: [Auth]
      summary: 내 정보 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserInfo'
    delete:
      tags: [Auth]
      summary: 회원 탈퇴
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/users/nickname/availability:
    get:
      tags: [Auth]
      summary: 닉네임 중복 확인
      description: 추가정보 입력(0.5) 단계에서 닉네임 사용 가능 여부를 확인한다.
      security:
        - bearerAuth: []
      parameters:
        - name: nickname
          in: query
          required: true
          description: 2~10자, 한글/영문/숫자만 허용
          schema:
            type: string
            minLength: 2
            maxLength: 10
            pattern: "^[A-Za-z0-9가-힣]{2,10}$"
      responses:
        '200':
          description: 닉네임 사용 가능 여부
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNicknameAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/additional-info:
    patch:
      tags: [Auth]
      summary: 추가 정보 입력 완료
      description: |
        신규 가입 공통(카카오/이메일) 추가 정보 입력을 저장한다.
        성공 시 nickname, phoneNumber, signupCompleted가 반영된다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdditionalInfoUpsertRequest'
      responses:
        '200':
          description: 추가 정보 저장 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdditionalInfoUpdated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/email/availability:
    get:
      tags: [Auth]
      summary: 이메일 중복 확인
      description: 이메일 회원가입 전 가입 가능 이메일인지 확인한다.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: 이메일 사용 가능 여부
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/email/verification-codes:
    post:
      tags: [Auth]
      summary: 이메일 인증코드 발송
      description: 6자리 숫자 인증코드를 이메일로 발송한다. (유효시간 3분, 재발송 60초 쿨다운, 1일 5회 제한)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationCodeSendRequest'
      responses:
        '200':
          description: 인증코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailVerificationCodeSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/email/verification-codes/verify:
    post:
      tags: [Auth]
      summary: 이메일 인증코드 확인
      description: 인증코드가 일치하면 이메일 인증 완료 상태로 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationCodeVerifyRequest'
      responses:
        '200':
          description: 인증코드 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailVerificationVerified'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/phone/verification-codes:
    post:
      tags: [Auth]
      summary: 전화번호 인증코드 발송
      description: 6자리 숫자 인증코드를 전화번호로 발송한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeSendRequest'
      responses:
        '200':
          description: 인증코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationCodeSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/phone/verification-codes/verify:
    post:
      tags: [Auth]
      summary: 전화번호 인증코드 확인
      description: 인증코드가 일치하면 전화번호 인증 완료 상태로 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeVerifyRequest'
      responses:
        '200':
          description: 인증코드 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationVerified'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/email/signup:
    post:
      tags: [Auth]
      summary: 이메일 회원가입
      description: 이메일 인증 완료 후 비밀번호를 설정해 계정을 생성하고 로그인 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailSignupRequest'
      responses:
        '200':
          description: 회원가입 및 로그인 성공
          headers:
            Set-Cookie:
              description: refreshToken HttpOnly 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthLogin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/email/login:
    post:
      tags: [Auth]
      summary: 이메일 로그인
      description: 이메일과 비밀번호를 검증하고 로그인 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailLoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: refreshToken HttpOnly 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthLogin'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/password/reset-link:
    post:
      tags: [Auth]
      summary: 비밀번호 재설정 링크 발송
      description: 가입된 이메일로 비밀번호 재설정 링크를 발송한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetLinkRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/me/profile:
    patch:
      tags: [Auth]
      summary: 프로필 수정
      description: 닉네임과 전화번호를 수정한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: 프로필 수정 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProfileUpdated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/users/me/phone/verification-codes:
    post:
      tags: [Auth]
      summary: 전화번호 변경 인증코드 발송
      description: 새 전화번호 검증을 위한 6자리 인증코드를 발송한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeSendRequest'
      responses:
        '200':
          description: 인증코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationCodeSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/phone/verification-codes/verify:
    post:
      tags: [Auth]
      summary: 전화번호 변경 인증코드 확인
      description: 인증코드 확인 후 전화번호 변경 가능 상태를 확정한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeVerifyRequest'
      responses:
        '200':
          description: 인증코드 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationVerified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/password/change:
    post:
      tags: [Auth]
      summary: 비밀번호 변경 (이메일 가입자 전용)
      description: 현재 비밀번호를 확인하고 새 비밀번호로 변경한다. 변경 완료 시 세션을 무효화한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─────────────────────────────────────────────────────────────
  # Region
  # ─────────────────────────────────────────────────────────────
  /api/v1/regions:
    get:
      tags: [Auth]
      summary: 전국 시/도 지역 목록 조회 (바텀시트용)
      description: 관심 지역 선택 바텀시트에서 표시할 전국 시/도 목록을 반환한다.
      responses:
        '200':
          description: 시/도 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRegionOptions'

  /api/v1/users/me/regions:
    get:
      tags: [Auth]
      summary: 내 관심 지역 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 관심 지역 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMyRegions'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Auth]
      summary: 관심 지역 저장/수정 (전체 교체)
      description: 기존 관심 지역을 모두 삭제하고 요청 목록으로 새로 저장한다. 빈 배열이면 전체 해제.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRegionsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────────────────────
  # GroupBuy
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buys:
    get:
      tags: [GroupBuy]
      summary: 공구 피드 목록 조회
      description: 진행 중인 공구 목록을 페이지네이션으로 조회한다. 비로그인 허용.
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [ALL, CLOSING_SOON, ALMOST_ACHIEVED, SEOUL, GYEONGGI]
            default: ALL
        - name: keyword
          in: query
          description: 매장명 또는 상품명 검색어
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 공구 피드 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyFeedPage'

  /api/v1/group-buys/{groupBuyId}:
    get:
      tags: [GroupBuy]
      summary: 공구 상세 조회
      description: 공구의 매장·상품·달성률·픽업 정보를 조회한다. 비로그인 허용.
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 공구 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/group-buys/{groupBuyId}/progress:
    get:
      tags: [GroupBuy]
      summary: 단일 공구 달성률 조회 (폴링용)
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 달성률
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyProgress'

  /api/v1/group-buys/progress:
    get:
      tags: [GroupBuy]
      summary: 다건 공구 달성률 조회 (피드 갱신용)
      parameters:
        - name: ids
          in: query
          required: true
          description: 조회할 공구 ID 목록 (최대 20개)
          schema:
            type: array
            items:
              type: integer
              format: int64
            maxItems: 20
      responses:
        '200':
          description: 공구별 달성률 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyProgressList'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/group-buys/{groupBuyId}/share:
    get:
      tags: [GroupBuy]
      summary: 공유 메타데이터 조회
      description: SNS 공유용 딥링크 URL 및 카드 메타데이터를 반환한다.
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 공유 메타데이터
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseShareMeta'

  /api/v1/search:
    post:
      tags: [GroupBuy]
      summary: 검색 실행 및 AI 키워드 분석 (1.1.4-1)
      description: |
        검색어를 입력하면 동네/베이커리 키워드를 AI로 분석하고 최근 검색어로 저장한다.
        분석 결과에 따라 4가지 케이스로 분기한다.
        - case 1: 베이커리 인식, 동네 미인식
        - case 2: 동네 인식, 베이커리 미인식
        - case 3: 동네+베이커리 모두 인식
        - case 4: 모두 인식 불가
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keyword]
              properties:
                keyword:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: AI 분석 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSearchAnalysis'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/search/recent:
    get:
      tags: [GroupBuy]
      summary: 최근 검색어 목록 조회
      description: |
        검색창 탭 시 표시할 사용자의 최근 검색어를 최신순으로 반환한다. (1.1.4-10)
        검색 이력이 없으면 빈 배열 반환.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 최근 검색어 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRecentSearchList'
        '401':
