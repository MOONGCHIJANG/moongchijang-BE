openapi: 3.0.3

info:
  title: 뭉치장 API
  description: |
    유행 음식 공동구매 플랫폼 뭉치장의 API 명세입니다.

    ## 인증
    로그인이 필요한 API는 `Authorization: Bearer {accessToken}` 헤더를 포함해야 합니다.

    ## 공통 응답 형식
    모든 응답은 아래 구조를 따릅니다.
    ```json
    { "success": true, "data": { ... }, "error": null }
    { "success": false, "data": null, "error": { "code": "ERROR_CODE", "message": "설명", "detail": "상세" } }
    ```
  version: v1

servers:
  - url: https://api.moongchijang.com
    description: 운영 서버
  - url: https://api.moongchijang.com/dev
    description: 개발 서버
  - url: http://localhost:8080
    description: 로컬 서버

tags:
  - name: Auth
    description: 카카오 로그인 및 토큰 관리
  - name: GroupBuy
    description: 공구 피드 · 상세 · 달성률
  - name: GroupBuyRequest
    description: 공구 개설 요청 (소비자)
  - name: Wishlist
    description: 찜 추가 · 해제 · 목록
  - name: Participation
    description: 공구 참여 · 결제 · 취소 · 환불
  - name: Pickup
    description: 픽업 안내 · QR 코드
  - name: Notification
    description: 알림 목록 · 읽음 처리
  - name: MyPage
    description: 마이페이지 (참여중 · 완료 · 환불 · 요청 내역)
  - name: Owner
    description: 사장님 전용 (QR 스캔 · 홈 · 예약 목록)
  - name: Admin
    description: 운영자 전용 (공구요청 · 공구관리 · 환불 · 정산)
  - name: ImageUpload
    description: S3 Presigned URL 발급 · 이미지 삭제

paths:

  # ─────────────────────────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────────────────────────
  /api/v1/auth/kakao:
    post:
      tags: [Auth]
      summary: 카카오 로그인 / 회원가입
      description: |
        카카오 인가 코드로 로그인하거나 최초 가입 처리한다.
        카카오 닉네임은 선저장 단계에서 2~10자/한글·영문·숫자 조건을 만족할 때만 저장되며, 조건 미충족 시 null로 저장된다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KakaoLoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: 환경별 cookie path로 저장되는 refreshToken HttpOnly 쿠키 (prod=`/`, dev=`/dev`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthLogin'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Access Token 갱신
      description: |
        HttpOnly 쿠키의 refreshToken을 검증해 Access Token을 재발급한다.
        refreshToken 쿠키는 환경별 path를 사용하며, 현재 요청 경로와 동일한 path 기준으로 갱신된다. (prod=`/`, dev=`/dev`)
      responses:
        '200':
          description: 토큰 갱신 성공
          headers:
            Set-Cookie:
              description: refreshToken rotation 시 동일 path 기준으로 갱신되는 신규 refreshToken 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAccessToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: |
        Refresh Token을 무효화한다.
        refreshToken 쿠키는 발급 시 사용한 동일 path 기준으로 삭제한다. (prod=`/`, dev=`/dev`)
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me:
    get:
      tags: [Auth]
      summary: 내 정보 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserInfo'
    delete:
      tags: [Auth]
      summary: 회원 탈퇴
      description: |
        소비자 현재 역할(BUYER)에서 회원 탈퇴를 처리한다.
        - 탈퇴 진입 컨텍스트 조회 결과와 무관하게 실행 시점 최종 검증을 다시 수행한다.
        - 수령 예정 공구(달성 완료 + 픽업 미완료)가 있으면 탈퇴할 수 없다.
        - 참여 중 공구(PAID_WAITING_GOAL)는 자동 취소된다.
        - 찜 목록은 모두 삭제된다.
        - 동일 계정은 탈퇴 후 30일 이후 재가입 가능하다.
        - 최종 검증 실패 시 409 에러를 반환한다. (예: WITHDRAWAL_BLOCKED_PENDING_PICKUP)
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/users/me/role:
    patch:
      tags: [Auth]
      summary: 마이페이지 역할 전환
      description: 소비자/사장님 모드를 전환한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyPageRoleSwitchRequest'
      responses:
        '200':
          description: 전환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/users/me/withdrawal-context:
    get:
      tags: [Auth]
      summary: 탈퇴 진입 컨텍스트 조회
      description: |
        소비자/사장님 탈퇴 가능 상태와 권장 탈퇴 화면 정보를 조회한다.
        이 응답은 진입/라우팅 가이드 용도이며, 실제 탈퇴 실행 시점에는 최종 검증이 다시 수행된다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 탈퇴 진입 컨텍스트 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWithdrawalContext'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/users/nickname/availability:
    get:
      tags: [Auth]
      summary: 닉네임 중복 확인
      description: |
        추가정보 입력(0.5) 단계에서 닉네임 사용 가능 여부를 확인한다.
        인증 사용자가 호출한 경우 본인 현재 닉네임은 중복으로 보지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - name: nickname
          in: query
          required: true
          description: 2~10자, 한글/영문/숫자만 허용
          schema:
            type: string
            minLength: 2
            maxLength: 10
            pattern: "^[A-Za-z0-9가-힣]{2,10}$"
      responses:
        '200':
          description: 닉네임 사용 가능 여부
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNicknameAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/additional-info:
    patch:
      tags: [Auth]
      summary: 추가 정보 입력 완료
      description: |
        신규 가입 공통(카카오/이메일) 추가 정보 입력을 저장한다.
        닉네임은 최종 저장 시점에 중복 검증되며, 본인 현재 닉네임과 동일한 값은 허용된다.
        성공 시 nickname, phoneNumber, signupCompleted가 반영된다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdditionalInfoUpsertRequest'
      responses:
        '200':
          description: 추가 정보 저장 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdditionalInfoUpdated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/users/me/seller/business-registration/lookup:
    post:
      tags: [Auth]
      summary: 사업자등록번호 조회
      description: |
        사장님 가입 진행 중 사업자등록번호를 조회해 상태를 반환한다.
        현재 활성 역할이 SELLER가 아니어도, 사장님 가입 흐름에서는 호출할 수 있다.
        - `VALID`: 정상 사업자(계속사업자)
        - `CLOSED`: 휴업/폐업
        - `NOT_FOUND`: 조회 불가/미확인
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessRegistrationLookupRequest'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBusinessRegistrationLookup'
        '400':
          description: "입력값 검증 실패 (예: INVALID_BUSINESS_REGISTRATION_NUMBER_FORMAT)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/seller/business-info:
    patch:
      tags: [Auth]
      summary: 사장님 사업자 정보 저장
      description: |
        사장님 가입 진행 중 사업자 정보를 저장한다.
        현재 활성 역할이 SELLER가 아니어도, 사장님 가입 흐름에서는 호출할 수 있다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellerBusinessInfoUpsertRequest'
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSellerSignupStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/seller/settlement-info:
    patch:
      tags: [Auth]
      summary: 사장님 정산 정보 저장
      description: |
        사장님 가입 진행 중 정산 정보를 저장하고 사장님 가입 완료 상태를 반영한다.
        현재 활성 역할이 SELLER가 아니어도, 사장님 가입 흐름에서는 호출할 수 있다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellerSettlementInfoUpsertRequest'
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSellerSignupStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/users/me/seller/settlement-account:
    get:
      tags: [Auth]
      summary: 사장님 입금 계좌 조회
      description: 현재 활성 역할이 SELLER일 때 사장님의 현재 입금 계좌 정보를 조회한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSellerSettlementAccount'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Auth]
      summary: 사장님 입금 계좌 변경
      description: 현재 활성 역할이 SELLER일 때 사장님의 입금 계좌 정보를 변경한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellerSettlementInfoUpsertRequest'
      responses:
        '200':
          description: 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSellerSettlementAccount'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/users/me/seller/business-profile:
    get:
      tags: [Auth]
      summary: 사장님 사업자 정보 조회
      description: 현재 활성 역할이 SELLER일 때 사장님의 현재 사업자 정보를 조회한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSellerBusinessProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Auth]
      summary: 사장님 사업자 정보 변경
      description: 현재 활성 역할이 SELLER일 때 사장님의 사업자 정보를 변경한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellerBusinessInfoUpsertRequest'
      responses:
        '200':
          description: 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSellerBusinessProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/me/seller:
    delete:
      tags: [Auth]
      summary: 사장님 회원 탈퇴
      description: |
        현재 활성 역할이 SELLER일 때 사장님 회원 탈퇴를 처리한다.
        - 탈퇴 진입 컨텍스트 조회 결과와 무관하게 실행 시점 최종 검증을 다시 수행한다.
        - 개설된 공구(IN_PROGRESS)가 있으면 탈퇴할 수 없다.
        - 달성 완료/완료 공구(ACHIEVED, COMPLETED)에 픽업 미완료 참여가 있으면 탈퇴할 수 없다.
        - 소비자 수령 예정 공구가 있으면 탈퇴할 수 없다.
        - 동일 계정은 탈퇴 후 30일 이후 재가입 가능하다.
        - 최종 검증 실패 시 409 에러를 반환한다. (예: OWNER_WITHDRAWAL_BLOCKED_OPEN_GROUPBUY, OWNER_WITHDRAWAL_BLOCKED_PENDING_CUSTOMER_PICKUP, WITHDRAWAL_BLOCKED_PENDING_PICKUP)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerWithdrawRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/email/availability:
    get:
      tags: [Auth]
      summary: 이메일 중복 확인
      description: 이메일 회원가입 전 가입 가능 이메일인지 확인한다.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: 이메일 사용 가능 여부
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/email/verification-codes:
    post:
      tags: [Auth]
      summary: 이메일 인증코드 발송
      description: 6자리 숫자 인증코드를 이메일로 발송한다. (유효시간 3분, 재발송 60초 쿨다운, 1일 5회 제한)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationCodeSendRequest'
      responses:
        '200':
          description: 인증코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailVerificationCodeSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/email/verification-codes/verify:
    post:
      tags: [Auth]
      summary: 이메일 인증코드 확인
      description: 인증코드가 일치하면 이메일 인증 완료 상태로 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationCodeVerifyRequest'
      responses:
        '200':
          description: 인증코드 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailVerificationVerified'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/phone/verification-codes:
    post:
      tags: [Auth]
      summary: 전화번호 인증코드 발송
      description: 6자리 숫자 인증코드를 전화번호로 발송한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeSendRequest'
      responses:
        '200':
          description: 인증코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationCodeSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/phone/verification-codes/verify:
    post:
      tags: [Auth]
      summary: 전화번호 인증코드 확인
      description: 인증코드가 일치하면 전화번호 인증 완료 상태로 처리한다.
      requestBody:
