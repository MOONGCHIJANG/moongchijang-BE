    ApiResponseSellerSignupStatus:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [id, sellerSignupCompleted]
          properties:
            id: { type: integer, format: int64, example: 1 }
            sellerSignupCompleted: { type: boolean, example: true }
        error: { nullable: true, example: null }

    ApiResponseEmailAvailability:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [email, available]
          properties:
            email:
              type: string
              format: email
            available:
              type: boolean
              example: true
        error: { nullable: true, example: null }

    EmailVerificationCodeSendRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ApiResponseEmailVerificationCodeSent:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [expiresInSeconds, resendAvailableInSeconds, remainingDailyAttempts]
          properties:
            expiresInSeconds: { type: integer, example: 180 }
            resendAvailableInSeconds: { type: integer, example: 60 }
            remainingDailyAttempts: { type: integer, example: 4 }
        error: { nullable: true, example: null }

    EmailVerificationCodeVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: "^[0-9]{6}$"

    ApiResponseEmailVerificationVerified:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [verified, signupToken]
          properties:
            verified: { type: boolean, example: true }
            signupToken:
              type: string
              description: 이메일 회원가입 단계 진행용 임시 토큰
        error: { nullable: true, example: null }

    EmailSignupRequest:
      type: object
      required: [email, password, signupToken]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 20
          pattern: "^(?=.*[A-Za-z])(?=.*[0-9]).{8,20}$"
          description: 8~20자, 영문+숫자 포함
        signupToken:
          type: string

    EmailLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    PasswordResetLinkRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ProfileUpdateRequest:
      type: object
      required: [nickname, phoneNumber]
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 10
          pattern: "^[A-Za-z0-9가-힣]{2,10}$"
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    ApiResponseProfileUpdated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [id, nickname, phoneNumber, updatedAt]
          properties:
            id: { type: integer, format: int64 }
            nickname: { type: string }
            phoneNumber: { type: string }
            updatedAt: { type: string, format: date-time }
        error: { nullable: true, example: null }

    PhoneVerificationCodeSendRequest:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    ApiResponsePhoneVerificationCodeSent:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [expiresInSeconds, resendAvailableInSeconds]
          properties:
            expiresInSeconds: { type: integer, example: 180 }
            resendAvailableInSeconds: { type: integer, example: 0 }
        error: { nullable: true, example: null }

    PhoneVerificationCodeVerifyRequest:
      type: object
      required: [phoneNumber, code]
      properties:
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"
        code:
          type: string
          pattern: "^[0-9]{6}$"

    ApiResponsePhoneVerificationVerified:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [verified]
          properties:
            verified: { type: boolean, example: true }
        error: { nullable: true, example: null }

    PasswordChangeRequest:
      type: object
      required: [currentPassword, newPassword, newPasswordConfirm]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 20
          pattern: "^(?=.*[A-Za-z])(?=.*[0-9]).{8,20}$"
          description: 8~20자, 영문+숫자 포함
        newPasswordConfirm:
          type: string

    AuthUser:
      type: object
      required: [id, provider, role, signupCompleted, sellerSignupCompleted, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        provider:
          type: string
          enum: [KAKAO, EMAIL]
        providerId:
          type: string
          nullable: true
          description: 소셜 제공자 아이디 (카카오 고유 ID 등)
        email:
          type: string
          format: email
          nullable: true
        nickname:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        role:
          type: string
          enum: [BUYER, SELLER, ADMIN]
        lastRole:
          type: string
          nullable: true
          enum: [BUYER, SELLER, ADMIN]
        signupCompleted: { type: boolean }
        sellerSignupCompleted: { type: boolean }
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApiResponseMyRegions:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [regions, primaryRegion, additionalCount]
          properties:
            regions:
              type: array
              description: "선택한 관심 지역 목록 (등록 순, 시/도 단위)"
              items:
                type: string
            primaryRegion:
              type: string
              nullable: true
              description: "칩에 표시할 첫 번째 지역명. 비어있으면 null"
            additionalCount:
              type: integer
              description: "primaryRegion 외 추가 지역 수. 예: 서울 외 3곳 → additionalCount=3"
        error: { nullable: true, example: null }

    UpdateRegionsRequest:
      type: object
      required: [regions]
      properties:
        regions:
          type: array
          maxItems: 10
          description: "저장할 시/도 지역 목록. 빈 배열이면 전체 해제"
          items:
            type: string

    # ── GroupBuy ───────────────────────────────────────────────
    GroupBuyFeedItemResponse:
      type: object
      required: [id, thumbnailUrl, dDay, dDayLabel, storeName, regionType, regionLabel, districtType, districtLabel, productName, price, achievementRate, currentQuantity, targetQuantity, pickupDateLabel, deadline]
      properties:
        id: { type: integer, format: int64 }
        thumbnailUrl: { type: string, nullable: true, description: 대표 썸네일 이미지 URL }
        dDay: { type: integer, description: "마감 D-day (예: D-3 -> 3)" }
        dDayLabel: { type: string, description: "마감 뱃지 문자열 (예: D-3)" }
        storeName: { type: string }
        regionType: { $ref: '#/components/schemas/RegionType' }
        regionLabel: { type: string, description: 시/도 한글 라벨, example: 서울 }
        districtType: { $ref: '#/components/schemas/DistrictType' }
        districtLabel: { type: string, description: 세부지역 한글 라벨, example: "강남 | 역삼 | 삼성" }
        productName: { type: string }
        price: { type: integer }
        achievementRate: { type: integer, description: 달성률 % (0~100) }
        currentQuantity: { type: integer }
        targetQuantity: { type: integer }
        pickupDateLabel: { type: string, description: 픽업 날짜 표시 문자열, example: "4/15(화)" }
        deadline: { type: string, format: date-time, description: 마감 일시 원본 값 }

    WishlistItemResponse:
      type: object
      required: [groupBuyId, thumbnailUrl, dDay, dDayLabel, storeName, regionLabel, productName, pickupDate, pickupDateLabel, deadline, deadlineLabel, achievementRate, price, currentParticipantCount, targetParticipantCount, isWishlisted]
      properties:
        groupBuyId: { type: integer, format: int64 }
        thumbnailUrl: { type: string, nullable: true, description: 대표 썸네일 URL }
        dDay: { type: integer, description: "마감 D-day (예: D-3 -> 3)" }
        dDayLabel: { type: string, description: "마감 뱃지 문자열 (예: D-3)" }
        storeName: { type: string }
        regionLabel: { type: string, description: 시/도 한글 라벨, example: 서울 }
        productName: { type: string }
        pickupDate: { type: string, format: date, description: 픽업 날짜 원본 값 }
        pickupDateLabel: { type: string, description: 픽업 날짜 표시 문자열, example: "4/15(화)" }
        deadline: { type: string, format: date-time, description: 마감 일시 원본 값 }
        deadlineLabel: { type: string, description: 마감 날짜 표시 문자열, example: "4/12(토) 21:00" }
        achievementRate: { type: integer, description: 달성률 % (0~100) }
        price: { type: integer }
        currentParticipantCount: { type: integer, description: 현재 참여 인원 수 }
        targetParticipantCount: { type: integer, description: 목표 참여 인원 수 }
        isWishlisted: { type: boolean, description: 찜 여부 }

