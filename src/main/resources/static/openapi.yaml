        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 공구 요청 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminRequestPage'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/group-buy-requests/{requestId}:
    get:
      tags: [Admin]
      summary: 공구 요청 상세 조회 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 요청 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminRequestDetail'

  /api/v1/admin/group-buy-requests/{requestId}/status:
    patch:
      tags: [Admin]
      summary: 공구 요청 상태 변경
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRequestStatusUpdate'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '400':
