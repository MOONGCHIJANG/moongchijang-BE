            totalPages: { type: integer }
            number: { type: integer }
            size: { type: integer }
        error: { nullable: true, example: null }

    AdminSettlementListItem:
      type: object
      required: [settlementId, groupBuyId, storeName, productName, pickupCompletedDate, participantCount, totalPaymentAmount, refundDeductionAmount, platformFeeAmount, settlementAmount, scheduledSettlementDate, status, actionable]
      properties:
        settlementId:
          type: integer
          format: int64
          description: 정산 식별자. 현재는 groupBuyId와 동일
        groupBuyId: { type: integer, format: int64 }
        storeName: { type: string }
        productName: { type: string }
        pickupCompletedDate:
          type: string
          format: date
          description: 픽업 완료 기준일. 현재는 공구 pickupDate 기준
        participantCount:
          type: integer
          format: int64
          description: 정산 대상 참여 인원
        totalPaymentAmount:
          type: integer
          format: int64
          description: 총 결제액
        refundDeductionAmount:
          type: integer
          format: int64
          description: 환불 차감액
        platformFeeAmount:
          type: integer
          format: int64
          description: 서비스 수수료. 현재 정책은 0원
        settlementAmount:
          type: integer
          format: int64
          description: 총 결제액 - 환불 차감액
        scheduledSettlementDate:
          type: string
          format: date
          description: 정산 예정일. 현재 정책은 pickupCompletedDate + 3일
        status:
          type: string
          enum: [SCHEDULED, COMPLETED]
        actionable:
          type: boolean
          description: 운영 작업 가능 여부

    ApiResponseAdminSettlementDetail:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/AdminSettlementDetail'
        error: { nullable: true, example: null }

    AdminSettlementDetail:
      allOf:
        - $ref: '#/components/schemas/AdminSettlementListItem'

    ApiResponseSearchAnalysis:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [searchCase, confidence, uiState, totalCount, results]
          properties:
            searchCase:
              type: string
              enum: [BOTH_DETECTED, PRODUCT_ONLY, NEIGHBORHOOD_ONLY, NONE_DETECTED]
              description: FULLTEXT 인덱스 매칭 결과 기반 분류 케이스(상품 인덱스 + 매장/주소 인덱스 hit 조합)
            detectedRegion:
              type: string
              nullable: true
              description: 매장/주소 인덱스가 매치된 경우 검색어, 아니면 null
            detectedProduct:
              type: string
              nullable: true
              description: 상품 인덱스가 매치된 경우 검색어, 아니면 null
            confidence:
              type: number
              format: double
              description: FULLTEXT 분류 신뢰도. BOTH=1.0 / 단일 인덱스 매치=0.5 / NONE=0.0
            uiState:
              type: string
              enum: [RESULTS, EMPTY_CAN_REQUEST, NEED_REGION, NEED_PRODUCT, NEED_BOTH, AMBIGUOUS_CONFIRMATION]
              description: |
                프론트 화면 분기 상태.
                RESULTS=공구 결과 노출 /
                EMPTY_CAN_REQUEST=검색 결과 없음, 공구 개설 요청 진입점 /
                NEED_REGION/NEED_PRODUCT/NEED_BOTH=추가 키워드 입력 안내 /
                AMBIGUOUS_CONFIRMATION=분류 결과 재확인 필요
            totalCount:
              type: integer
              description: 전체 공구 결과 개수
            results:
              type: array
              description: 검색된 공구 카드 목록
              items:
                $ref: '#/components/schemas/GroupBuyFeedItemResponse'
            recommendedStores:
              type: array
              nullable: true
              description: 검색 결과 0건(EMPTY_CAN_REQUEST) 일 때 동봉되는 동네 매장 추천 목록
              items:
                $ref: '#/components/schemas/RecommendedStoreDto'
        error: { nullable: true, example: null }

    RecommendedStoreDto:
      type: object
      required: [placeId, storeName, roadAddress, latitude, longitude]
      properties:
        placeId: { type: string, description: "외부 장소 ID(예: 네이버 Local)" }
        storeName: { type: string }
        roadAddress: { type: string }
        lotAddress: { type: string, nullable: true }
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
        imageUrl:
