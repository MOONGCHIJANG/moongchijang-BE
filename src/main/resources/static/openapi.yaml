      summary: 알림 목록 조회 (폴링용)
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          description: 알림 카테고리 필터
          schema:
            type: string
            enum: [ALL, WISH, APPLY, PICKUP, REQUEST]
            default: ALL
        - name: cursor
          in: query
          required: false
          description: "다음 페이지 조회 커서. 형식: `{occurredAt}|{id}`"
          schema:
            type: string
            example: "2026-05-22T09:00:00|101"
        - name: limit
          in: query
          required: false
          description: 조회 개수 (1~100, 기본 20)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
