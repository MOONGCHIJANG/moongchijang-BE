openapi: 3.0.3

info:
  title: 뭉치장 API
  description: |
    유행 음식 공동구매 플랫폼 뭉치장의 API 명세입니다.

    ## 인증
    로그인이 필요한 API는 `Authorization: Bearer {accessToken}` 헤더를 포함해야 합니다.

    ## 공통 응답 형식
    모든 응답은 아래 구조를 따릅니다.
    ```json
    { "success": true, "data": { ... }, "error": null }
    { "success": false, "data": null, "error": { "code": "ERROR_CODE", "message": "설명", "detail": "상세" } }
    ```
  version: v1

servers:
  - url: https://api.moongchijang.com/dev
    description: 개발 서버
  - url: http://localhost:8080
    description: 로컬 서버

tags:
  - name: Auth
    description: 카카오 로그인 및 토큰 관리
  - name: GroupBuy
    description: 공구 피드 · 상세 · 달성률
  - name: GroupBuyRequest
    description: 공구 개설 요청 (소비자)
  - name: Wishlist
    description: 찜 추가 · 해제 · 목록
  - name: Participation
    description: 공구 참여 · 결제 · 취소 · 환불
  - name: Pickup
    description: 픽업 안내 · QR 코드
  - name: Notification
    description: 알림 목록 · 읽음 처리
  - name: MyPage
    description: 마이페이지 (참여중 · 완료 · 환불 · 요청 내역)
  - name: Owner
    description: 사장님 전용 (QR 스캔 · 홈 · 예약 목록)
  - name: Admin
    description: 운영자 전용 (공구요청 · 공구관리 · 환불 · 정산)

paths:

  # ─────────────────────────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────────────────────────
  /api/v1/auth/kakao:
    post:
      tags: [Auth]
      summary: 카카오 로그인 / 회원가입
      description: 카카오 인가 코드로 로그인하거나 최초 가입 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KakaoLoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: refreshToken HttpOnly 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthLogin'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Access Token 갱신
      description: HttpOnly 쿠키의 refreshToken을 검증해 Access Token을 재발급한다.
      responses:
        '200':
          description: 토큰 갱신 성공
          headers:
            Set-Cookie:
              description: refreshToken rotation 시 신규 refreshToken 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAccessToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: Refresh Token을 무효화한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me:
    get:
      tags: [Auth]
      summary: 내 정보 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 내 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserInfo'
    delete:
      tags: [Auth]
      summary: 회원 탈퇴
      description: |
        회원 탈퇴를 처리한다.
        - 수령 예정 공구(달성 완료 + 픽업 미완료)가 있으면 탈퇴할 수 없다.
        - 참여 중 공구(PAID_WAITING_GOAL)는 자동 취소된다.
        - 찜 목록은 모두 삭제된다.
        - 동일 계정은 탈퇴 후 30일 이후 재가입 가능하다.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/users/nickname/availability:
    get:
      tags: [Auth]
      summary: 닉네임 중복 확인
      description: 추가정보 입력(0.5) 단계에서 닉네임 사용 가능 여부를 확인한다.
      security:
        - bearerAuth: []
      parameters:
        - name: nickname
          in: query
          required: true
          description: 2~10자, 한글/영문/숫자만 허용
          schema:
            type: string
            minLength: 2
            maxLength: 10
            pattern: "^[A-Za-z0-9가-힣]{2,10}$"
      responses:
        '200':
          description: 닉네임 사용 가능 여부
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNicknameAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/additional-info:
    patch:
      tags: [Auth]
      summary: 추가 정보 입력 완료
      description: |
        신규 가입 공통(카카오/이메일) 추가 정보 입력을 저장한다.
        성공 시 nickname, phoneNumber, signupCompleted가 반영된다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdditionalInfoUpsertRequest'
      responses:
        '200':
          description: 추가 정보 저장 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdditionalInfoUpdated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/users/me/seller/business-registration/lookup:
    post:
      tags: [Auth]
      summary: 사업자등록번호 조회
      description: |
        사업자등록번호를 조회해 상태를 반환한다.
        - `VALID`: 정상 사업자(계속사업자)
        - `CLOSED`: 휴업/폐업
        - `NOT_FOUND`: 조회 불가/미확인
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessRegistrationLookupRequest'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBusinessRegistrationLookup'
        '400':
          description: 입력값 검증 실패 (예: INVALID_BUSINESS_REGISTRATION_NUMBER_FORMAT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/seller/business-info:
    patch:
      tags: [Auth]
      summary: 사장님 사업자 정보 저장
      description: 사장님 가입의 사업자 정보를 저장한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellerBusinessInfoUpsertRequest'
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSellerSignupStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/seller/settlement-info:
    patch:
      tags: [Auth]
      summary: 사장님 정산 정보 저장
      description: 사장님 정산 정보를 저장하고 사장님 가입 완료 상태를 반영한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellerSettlementInfoUpsertRequest'
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSellerSignupStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/email/availability:
    get:
      tags: [Auth]
      summary: 이메일 중복 확인
      description: 이메일 회원가입 전 가입 가능 이메일인지 확인한다.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: 이메일 사용 가능 여부
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailAvailability'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/email/verification-codes:
    post:
      tags: [Auth]
      summary: 이메일 인증코드 발송
      description: 6자리 숫자 인증코드를 이메일로 발송한다. (유효시간 3분, 재발송 60초 쿨다운, 1일 5회 제한)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationCodeSendRequest'
      responses:
        '200':
          description: 인증코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailVerificationCodeSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/email/verification-codes/verify:
    post:
      tags: [Auth]
      summary: 이메일 인증코드 확인
      description: 인증코드가 일치하면 이메일 인증 완료 상태로 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationCodeVerifyRequest'
      responses:
        '200':
          description: 인증코드 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmailVerificationVerified'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/phone/verification-codes:
    post:
      tags: [Auth]
      summary: 전화번호 인증코드 발송
      description: 6자리 숫자 인증코드를 전화번호로 발송한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeSendRequest'
      responses:
        '200':
          description: 인증코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationCodeSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/v1/auth/phone/verification-codes/verify:
    post:
      tags: [Auth]
      summary: 전화번호 인증코드 확인
      description: 인증코드가 일치하면 전화번호 인증 완료 상태로 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeVerifyRequest'
      responses:
        '200':
          description: 인증코드 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationVerified'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/email/signup:
    post:
      tags: [Auth]
      summary: 이메일 회원가입
      description: 이메일 인증 완료 후 비밀번호를 설정해 계정을 생성하고 로그인 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailSignupRequest'
      responses:
        '200':
          description: 회원가입 및 로그인 성공
          headers:
            Set-Cookie:
              description: refreshToken HttpOnly 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthLogin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/email/login:
    post:
      tags: [Auth]
      summary: 이메일 로그인
      description: 이메일과 비밀번호를 검증하고 로그인 처리한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailLoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: refreshToken HttpOnly 쿠키
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthLogin'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/password/reset-link:
    post:
      tags: [Auth]
      summary: 비밀번호 재설정 링크 발송
      description: 가입된 이메일로 비밀번호 재설정 링크를 발송한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetLinkRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/me/profile:
    patch:
      tags: [Auth]
      summary: 프로필 수정
      description: 닉네임과 전화번호를 수정한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: 프로필 수정 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProfileUpdated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/users/me/phone/verification-codes:
    post:
      tags: [Auth]
      summary: 전화번호 변경 인증코드 발송
      description: 새 전화번호 검증을 위한 6자리 인증코드를 발송한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeSendRequest'
      responses:
        '200':
          description: 인증코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationCodeSent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/phone/verification-codes/verify:
    post:
      tags: [Auth]
      summary: 전화번호 변경 인증코드 확인
      description: 인증코드 확인 후 전화번호 변경 가능 상태를 확정한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationCodeVerifyRequest'
      responses:
        '200':
          description: 인증코드 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePhoneVerificationVerified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/password/change:
    post:
      tags: [Auth]
      summary: 비밀번호 변경 (이메일 가입자 전용)
      description: 현재 비밀번호를 확인하고 새 비밀번호로 변경한다. 변경 완료 시 세션을 무효화한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/me/regions:
    get:
      tags: [Auth]
      summary: 내 관심 지역 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 관심 지역 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMyRegions'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Auth]
      summary: 관심 지역 저장/수정 (전체 교체)
      description: 기존 관심 지역을 모두 삭제하고 요청 목록으로 새로 저장한다. 빈 배열이면 전체 해제.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRegionsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────────────────────
  # GroupBuy
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buys:
    get:
      tags: [GroupBuy]
      summary: 공구 피드 목록 조회
      description: |
        진행 중인 공구 목록(2열 카드 피드)을 페이지네이션으로 조회한다. 비로그인 허용.
        - `filter=ALL`: 전체
        - `filter=CLOSING_SOON`: 마감임박 (마감일 D-3 이하)
        - `filter=ALMOST_ACHIEVED`: 달성임박 (달성률 80% 이상)
        - 지역 필터는 `districts`로 복수 선택(최대 10개) 가능
        - 클라이언트 표시는 한글 라벨, 요청 전송값은 영문 코드(enum) 사용
        - 선택 규칙:
          - 같은 시/도 내 `*_ALL`과 하위 세부지역 동시 선택 불가
          - 전체 선택 개수(지역/세부지역 통합) 최대 10개
      parameters:
        - name: filter
          in: query
          description: 전체/마감임박/달성임박 단일 선택 칩
          schema:
            type: string
            enum: [ALL, CLOSING_SOON, ALMOST_ACHIEVED]
            default: ALL
        - name: districts
          in: query
          description: "지역/세부지역 통합 필터 (복수 선택, 최대 10개, 예: SEOUL_ALL / SEOUL_GANGNAM_YEOKSAM_SAMSEONG)"
          schema:
            type: array
            maxItems: 10
            items:
              $ref: '#/components/schemas/DistrictType'
          style: form
          explode: true
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 공구 피드 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyFeedPageResponse'
        '400':
          description: "잘못된 필터 요청 (예: 같은 시/도 ALL+하위 동시 선택, 선택 개수 10개 초과)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

  /api/v1/group-buys/{groupBuyId}:
    get:
      tags: [GroupBuy]
