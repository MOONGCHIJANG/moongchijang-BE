    # ── GroupBuyRequest ────────────────────────────────────────
    GroupBuyRequestCreate:
      type: object
      required: [storeName, productName, desiredQuantity, desiredPickupDate]
      properties:
        storeName:
          type: string
          maxLength: 100
        storeAddress:
          type: string
          maxLength: 200
          nullable: true
          description: 매장 주소. roadAddress가 함께 전달되면 서버는 roadAddress를 우선 저장한다.
        placeId:
          type: string
          maxLength: 100
          nullable: true
          description: 네이버 장소 고유 ID
        roadAddress:
          type: string
          maxLength: 200
          nullable: true
          description: 네이버 장소 도로명 주소
        lotAddress:
          type: string
          maxLength: 200
          nullable: true
          description: 네이버 장소 지번 주소
        latitude:
          type: number
          format: double
          nullable: true
          description: 네이버 장소 위도
        longitude:
          type: number
          format: double
          nullable: true
          description: 네이버 장소 경도
        productName:
          type: string
          maxLength: 100
        desiredQuantity:
          type: integer
          minimum: 1
        desiredPickupDate:
          type: string
          format: date
          description: 오늘 이후 날짜
        additionalNote:
          type: string
          maxLength: 500
          nullable: true

    ApiResponseRequestId:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [requestId]
          properties:
            requestId: { type: integer, format: int64 }
        error: { nullable: true, example: null }

    GroupBuyRequestDetail:
      type: object
      required: [requestId, storeName, productName, desiredQuantity, desiredPickupDate, status, rejectionReason, createdAt]
      properties:
        requestId: { type: integer, format: int64 }
        storeName: { type: string }
        storeAddress: { type: string, nullable: true }
        placeId: { type: string, nullable: true }
        roadAddress: { type: string, nullable: true }
        lotAddress: { type: string, nullable: true }
        latitude: { type: number, format: double, nullable: true }
        longitude: { type: number, format: double, nullable: true }
        productName: { type: string }
        desiredQuantity: { type: integer }
        desiredPickupDate: { type: string, format: date }
        additionalNote: { type: string, nullable: true }
        status:
          type: string
          enum: [SUBMITTED, IN_REVIEW, IN_CONTACT, OPENED, REJECTED]
          description: |
            SUBMITTED=요청 접수 / IN_REVIEW=검토 중 / IN_CONTACT=매장 컨택 중 /
            OPENED=공구 개설 완료 / REJECTED=개설 불가
        rejectionReason: { type: string, nullable: true, description: status=REJECTED 시 노출 }
        createdAt: { type: string, format: date-time }

    ApiResponseGroupBuyRequestList:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            $ref: '#/components/schemas/GroupBuyRequestDetail'
        error: { nullable: true, example: null }

    ApiResponseGroupBuyRequestDetail:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/GroupBuyRequestDetail'
        error: { nullable: true, example: null }

    # ── Wishlist ───────────────────────────────────────────────
    ApiResponseWishlistPage:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [content, totalElements, totalPages, number, size, urgentCount]
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/GroupBuyFeedItemResponse'
            totalElements: { type: integer }
            totalPages: { type: integer }
            number: { type: integer }
            size: { type: integer }
            urgentCount:
              type: integer
              description: 마감 24시간 이내 건수 (0이면 배너 미노출)
        error: { nullable: true, example: null }

    # ── Participation ──────────────────────────────────────────
    ParticipationCreate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1

    ApiResponseParticipationCreated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [participationId, orderName, totalAmount, productAmount, feeAmount]
          properties:
            participationId: { type: integer, format: int64 }
            orderName: { type: string, description: "포트원 SDK에 전달할 주문명. 예) 두쫀쿠 오리지널 1개" }
            totalAmount: { type: integer, description: 상품금액 + 수수료(30%) — 포트원 SDK totalAmount에 사용 }
            productAmount: { type: integer }
            feeAmount: { type: integer }
        error: { nullable: true, example: null }

    PaymentConfirm:
      type: object
      required: [paymentId, amount]
      description: |
        포트원 v2 + 토스페이먼츠 결제 성공 후 서버 검증 요청.
        클라이언트가 PortOne.requestPayment() 완료 시 반환된 paymentId를 전달한다.
        서버는 포트원 API(GET /payments/{paymentId})로 위변조 검증 후 확정 처리한다.
      properties:
        paymentId:
          type: string
          description: 서버가 결제 주문 생성 시 반환한 PortOne paymentId
        amount: { type: integer, description: 결제 요청 금액 — 서버 저장값과 불일치 시 위변조로 처리 }

    PaymentOrderCreate:
      type: object
      required: [quantity, agreedNoCancelAfterGoal, agreedRefundBeforeGoal, agreedNoRefundAfterNoShow, agreedNoWithdrawal]
      properties:
        quantity: { type: integer, minimum: 1 }
        agreedNoCancelAfterGoal: { type: boolean, description: 달성 후 취소 불가 동의 }
        agreedRefundBeforeGoal: { type: boolean, description: 달성 전 이탈 시 전액 환불 동의 }
        agreedNoRefundAfterNoShow: { type: boolean, description: 미수령 환불 불가 동의 }
        agreedNoWithdrawal: { type: boolean, description: 청약철회 불가 동의 }

    CancelParticipationRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [TIME_UNAVAILABLE, NO_LONGER_WANTED, PREFER_DIRECT_VISIT, BOUGHT_ELSEWHERE, OTHER]
          description: 취소 사유. OTHER 선택 시 reasonDetail 필수.
        reasonDetail:
          type: string
          maxLength: 500
          nullable: true
          description: 기타 상세 사유

