    get:
      tags: [Pickup]
      summary: QR 픽업 코드 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ParticipationId'
      responses:
        '200':
          description: QR 코드 데이터
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseQrCode'

  /api/v1/pickups/me/nearest-qr:
    get:
      tags: [Pickup]
      summary: 피드용 가장 가까운 픽업 QR 조회
      description: |
        피드 진입 시 사용자의 가장 가까운 픽업 QR 후보를 조회한다.
        당일 픽업 예정 건이 있으면 픽업 시작 시간이 가장 빠른 건을 반환하고,
        당일 건이 여러 개면 hasMultipleToday=true로 내려준다.
        당일 픽업 건이 없고 향후 픽업 예정 건만 있으면 LOCKED 상태와 qrCode=null로 반환한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 가장 가까운 픽업 QR 후보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNearestPickupQr'

  /api/v1/pickups/{qrCode}/verify:
    post:
      tags: [Pickup]
      summary: QR 코드 스캔 검증 및 수령 처리
      description: |
        현재 활성 역할이 SELLER 또는 ADMIN일 때만 호출할 수 있다.
        SELLER 역할 사용자가 본인 매장 공구의 소비자 QR을 스캔하면 READY → PICKED_UP으로 자동 전환한다.
        ADMIN 역할 사용자는 운영 대리 처리 용도로 매장 소속 검증 없이 처리할 수 있다.
        응답에는 사장님 스캔 결과 화면에 필요한 유저이름, 상품명, 수량, 픽업 상태를 포함한다.
      security:
        - bearerAuth: []
      parameters:
        - name: qrCode
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 수령 처리 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePickupVerify'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  # ─────────────────────────────────────────────────────────────
  # Notification
  # ─────────────────────────────────────────────────────────────
  /api/v1/notifications:
    get:
      tags: [Notification]
      summary: 알림 목록 조회 (폴링용)
      description: |
        현재 로그인 사용자의 활성 역할 기준으로 알림 목록을 조회한다.
        - 소비자 역할(BUYER): 소비자 알림만 조회
        - 사장님 역할(SELLER): 사장님 알림만 조회
        - 관리자 역할(ADMIN): 앱 내 알림 API를 사용할 수 없다.
        - 역할에 맞지 않는 `category`를 요청하면 400 오류를 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          description: |
            알림 카테고리 필터
            - 소비자 역할: `ALL`, `WISH`, `APPLY`, `PICKUP`, `REQUEST`
            - 사장님 역할: `ALL`, `TODAY_PICKUP`, `REMINDER`, `CONFIRMED`, `CANCELLED`
          schema:
            type: string
            enum: [ALL, WISH, APPLY, PICKUP, REQUEST, TODAY_PICKUP, REMINDER, CONFIRMED, CANCELLED]
            default: ALL
        - name: cursor
          in: query
          required: false
          description: "다음 페이지 조회 커서. 형식: `{occurredAt}|{id}`"
          schema:
            type: string
            example: "2026-05-22T09:00:00|101"
        - name: limit
          in: query
          required: false
          description: 조회 개수 (1~100, 기본 20)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 알림 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNotificationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/notifications/unread-count:
    get:
      tags: [Notification]
      summary: 미읽음 알림 개수 조회
      description: |
        현재 로그인 사용자의 활성 역할 기준 scope에 해당하는 미읽음 알림 개수만 조회한다.
        - BUYER면 소비자 알림 개수만 집계
        - SELLER면 사장님 알림 개수만 집계
      security:
        - bearerAuth: []
      responses:
