                $ref: '#/components/schemas/ApiResponseGroupBuyDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/group-buys/{groupBuyId}/progress:
    get:
      tags: [GroupBuy]
      summary: 단일 공구 달성률 조회 (폴링용)
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          description: 달성률
          content:
            application/json:
