  # ─────────────────────────────────────────────────────────────
  # GroupBuy
  # ─────────────────────────────────────────────────────────────
  /api/v1/group-buys:
    get:
      tags: [GroupBuy]
      summary: 공구 피드 목록 조회
      description: |
        진행 중인 공구 목록(2열 카드 피드)을 페이지네이션으로 조회한다. 비로그인 허용.
        - `filter=ALL`: 전체
        - `filter=CLOSING_SOON`: 마감임박 (마감일 D-3 이하)
        - `filter=ALMOST_ACHIEVED`: 달성임박 (달성률 80% 이상)
        - 지역 필터는 `districts`로 복수 선택(최대 10개) 가능
        - 클라이언트 표시는 한글 라벨, 요청 전송값은 영문 코드(enum) 사용
        - 선택 규칙:
          - 같은 시/도 내 `*_ALL`과 하위 세부지역 동시 선택 불가
          - 전체 선택 개수(지역/세부지역 통합) 최대 10개
      parameters:
        - name: filter
          in: query
          description: 전체/마감임박/달성임박 단일 선택 칩
          schema:
            type: string
            enum: [ALL, CLOSING_SOON, ALMOST_ACHIEVED]
            default: ALL
        - name: districts
          in: query
          description: "지역/세부지역 통합 필터 (복수 선택, 최대 10개, 예: SEOUL_ALL / SEOUL_GANGNAM_YEOKSAM_SAMSEONG)"
          schema:
            type: array
            maxItems: 10
            items:
              $ref: '#/components/schemas/DistrictType'
          style: form
          explode: true
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 공구 피드 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGroupBuyFeedPageResponse'
        '400':
          description: "잘못된 필터 요청 (예: 같은 시/도 ALL+하위 동시 선택, 선택 개수 10개 초과)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

  /api/v1/group-buys/{groupBuyId}:
    get:
      tags: [GroupBuy]
      summary: 공구 상세 조회
      description: 공구의 상품·매장·픽업·이미지 정보를 조회한다. 비로그인 허용.
      parameters:
