      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/admin/group-buys/{groupBuyId}/order-sheet:
    post:
      tags: [Admin]
      summary: 발주서 발송
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupBuyId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'

  /api/v1/admin/refunds:
    get:
      tags: [Admin]
      summary: 환불 처리 현황 목록 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ALL, WAITING, COMPLETED]
            default: ALL
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 환불 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminRefundPage'

  /api/v1/admin/refunds/{participationId}/manual:
    post:
      tags: [Admin]
      summary: 수동 환불 처리
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ParticipationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminManualRefund'
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/admin/settlements:
    get:
      tags: [Admin]
      summary: 정산 내역 목록 (운영자)
      security:
        - bearerAuth: []
      parameters:
        - name: escrowStatus
          in: query
          schema:
            type: string
            enum: [ALL, HOLDING, RELEASED]
            default: ALL
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 정산 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettlementPage'
    post:
      tags: [Admin]
      summary: 정산 생성 및 처리
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettlementCreate'
      responses:
        '201':
          description: 정산 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettlementId'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/admin/settlements/{settlementId}/release:
    post:
      tags: [Admin]
      summary: 에스크로 해제
      security:
        - bearerAuth: []
      parameters:
        - name: settlementId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/SuccessNoData'
        '409':
          $ref: '#/components/responses/Conflict'

# ─────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupBuyId:
      name: groupBuyId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ParticipationId:
      name: participationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    SuccessNoData:
      description: 성공 (데이터 없음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseEmpty'
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Conflict:
      description: 상태 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    TooManyRequests:
      description: 요청 횟수 초과
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'

  schemas:

    # ── 공통 응답 래퍼 ──────────────────────────────────────────
    ApiResponseEmpty:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data: { nullable: true, example: null }
        error: { nullable: true, example: null }

    ApiResponseError:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: false }
        data: { nullable: true, example: null }
        error:
          type: object
          required: [code, message, detail]
          properties:
            code: { type: string, example: GROUPBUY_NOT_FOUND }
            message: { type: string, example: 존재하지 않는 공구입니다 }
            detail: { type: string, nullable: true }

    # ── Auth ───────────────────────────────────────────────────
    KakaoLoginRequest:
      type: object
      required: [authorizationCode]
      properties:
        authorizationCode:
          type: string
          description: 카카오 인가 코드
        redirectUri:
          type: string
          nullable: true
          description: 카카오 인가 요청 시 사용한 redirect URI (서버 검증용)

    ApiResponseAuthLogin:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [accessToken, tokenType, expiresIn, isNewUser, user]
          properties:
            accessToken: { type: string }
            tokenType: { type: string, example: Bearer }
            expiresIn: { type: integer, format: int64, description: Access Token 만료 시간(초) }
            isNewUser: { type: boolean, description: 최초 가입 여부 }
            user:
              $ref: '#/components/schemas/AuthUser'
        error: { nullable: true, example: null }

    ApiResponseAccessToken:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [accessToken, tokenType, expiresIn]
          properties:
            accessToken: { type: string }
            tokenType: { type: string, example: Bearer }
            expiresIn: { type: integer, format: int64, description: Access Token 만료 시간(초) }
        error: { nullable: true, example: null }

    ApiResponseUserInfo:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: '#/components/schemas/AuthUser'
        error: { nullable: true, example: null }

    AdditionalInfoUpsertRequest:
      type: object
      required: [nickname, phoneNumber]
      properties:
        nickname:
          type: string
          description: 2~10자, 한글/영문/숫자만 허용
          minLength: 2
          maxLength: 10
          pattern: "^[A-Za-z0-9가-힣]{2,10}$"
        phoneNumber:
          type: string
          description: 하이픈 포함 휴대폰 번호 (01X-XXXX-XXXX)
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    ApiResponseNicknameAvailability:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [nickname, available]
          properties:
            nickname: { type: string, example: 뭉치장123 }
            available: { type: boolean, example: true }
        error: { nullable: true, example: null }

    ApiResponseAdditionalInfoUpdated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [id, nickname, phoneNumber, signupCompleted]
          properties:
            id: { type: integer, format: int64 }
            nickname: { type: string }
            phoneNumber: { type: string }
            signupCompleted: { type: boolean, example: true }
        error: { nullable: true, example: null }

    ApiResponseEmailAvailability:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [email, available]
          properties:
            email:
              type: string
              format: email
            available:
              type: boolean
              example: true
        error: { nullable: true, example: null }

    EmailVerificationCodeSendRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ApiResponseEmailVerificationCodeSent:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [expiresInSeconds, resendAvailableInSeconds, remainingDailyAttempts]
          properties:
            expiresInSeconds: { type: integer, example: 180 }
            resendAvailableInSeconds: { type: integer, example: 60 }
            remainingDailyAttempts: { type: integer, example: 4 }
        error: { nullable: true, example: null }

    EmailVerificationCodeVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: "^[0-9]{6}$"

    ApiResponseEmailVerificationVerified:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [verified, signupToken]
          properties:
            verified: { type: boolean, example: true }
            signupToken:
              type: string
              description: 이메일 회원가입 단계 진행용 임시 토큰
        error: { nullable: true, example: null }

    EmailSignupRequest:
      type: object
      required: [email, password, signupToken]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 20
          pattern: "^(?=.*[A-Za-z])(?=.*[0-9]).{8,20}$"
          description: 8~20자, 영문+숫자 포함
        signupToken:
          type: string

    EmailLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    PasswordResetLinkRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ProfileUpdateRequest:
      type: object
      required: [nickname, phoneNumber]
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 10
          pattern: "^[A-Za-z0-9가-힣]{2,10}$"
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    ApiResponseProfileUpdated:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [id, nickname, phoneNumber, updatedAt]
          properties:
            id: { type: integer, format: int64 }
            nickname: { type: string }
            phoneNumber: { type: string }
            updatedAt: { type: string, format: date-time }
        error: { nullable: true, example: null }

    PhoneVerificationCodeSendRequest:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"

    ApiResponsePhoneVerificationCodeSent:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [expiresInSeconds, resendAvailableInSeconds]
          properties:
            expiresInSeconds: { type: integer, example: 180 }
            resendAvailableInSeconds: { type: integer, example: 0 }
        error: { nullable: true, example: null }

    PhoneVerificationCodeVerifyRequest:
      type: object
      required: [phoneNumber, code]
      properties:
        phoneNumber:
          type: string
          pattern: "^01[0-9]-[0-9]{3,4}-[0-9]{4}$"
        code:
          type: string
          pattern: "^[0-9]{6}$"

    ApiResponsePhoneVerificationVerified:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [verified]
          properties:
            verified: { type: boolean, example: true }
        error: { nullable: true, example: null }

    PasswordChangeRequest:
      type: object
      required: [currentPassword, newPassword, newPasswordConfirm]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 20
          pattern: "^(?=.*[A-Za-z])(?=.*[0-9]).{8,20}$"
          description: 8~20자, 영문+숫자 포함
        newPasswordConfirm:
          type: string

    AuthUser:
      type: object
      required: [id, provider, role, signupCompleted, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        provider:
          type: string
          enum: [KAKAO, EMAIL]
        providerId:
          type: string
          nullable: true
          description: 소셜 제공자 아이디 (카카오 고유 ID 등)
        email:
          type: string
          format: email
          nullable: true
        nickname:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        role:
          type: string
          enum: [BUYER, SELLER, ADMIN]
        signupCompleted: { type: boolean }
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApiResponseMyRegions:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [regions, primaryRegion, additionalCount]
          properties:
            regions:
              type: array
              description: "선택한 관심 지역 목록 (등록 순, 시/도 단위)"
              items:
                type: string
            primaryRegion:
              type: string
              nullable: true
              description: "칩에 표시할 첫 번째 지역명. 비어있으면 null"
            additionalCount:
              type: integer
              description: "primaryRegion 외 추가 지역 수. 예: 서울 외 3곳 → additionalCount=3"
        error: { nullable: true, example: null }

    UpdateRegionsRequest:
      type: object
      required: [regions]
      properties:
        regions:
          type: array
          maxItems: 10
          description: "저장할 시/도 지역 목록. 빈 배열이면 전체 해제"
          items:
            type: string

    # ── GroupBuy ───────────────────────────────────────────────
    GroupBuyFeedItemResponse:
      type: object
      required: [id, thumbnailUrl, dDay, dDayLabel, storeName, regionType, regionLabel, districtType, districtLabel, productName, price, achievementRate, currentQuantity, targetQuantity, pickupDateLabel, deadline]
      properties:
        id: { type: integer, format: int64 }
        thumbnailUrl: { type: string, nullable: true, description: 대표 썸네일 이미지 URL }
        dDay: { type: integer, description: "마감 D-day (예: D-3 -> 3)" }
        dDayLabel: { type: string, description: "마감 뱃지 문자열 (예: D-3)" }
        storeName: { type: string }
        regionType: { $ref: '#/components/schemas/RegionType' }
        regionLabel: { type: string, description: 시/도 한글 라벨, example: 서울 }
        districtType: { $ref: '#/components/schemas/DistrictType' }
        districtLabel: { type: string, description: 세부지역 한글 라벨, example: "강남 | 역삼 | 삼성" }
        productName: { type: string }
        price: { type: integer }
        achievementRate: { type: integer, description: 달성률 % (0~100) }
        currentQuantity: { type: integer }
        targetQuantity: { type: integer }
        pickupDateLabel: { type: string, description: 픽업 날짜 표시 문자열, example: "4/15(화)" }
        deadline: { type: string, format: date-time, description: 마감 일시 원본 값 }

    ApiResponseGroupBuyFeedPageResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [content, page, size, totalPages, totalElements, hasNext, hasRegionalResult]
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/GroupBuyFeedItemResponse'
            page: { type: integer, description: 현재 페이지(1-base) }
            size: { type: integer, description: 페이지 크기 }
            totalPages: { type: integer, description: 전체 페이지 수 }
            totalElements: { type: integer }
            hasNext: { type: boolean, description: 다음 페이지 존재 여부 }
            hasRegionalResult: { type: boolean, description: 지역 설정 조건에 맞는 공구 존재 여부 (없으면 false) }
        error: { nullable: true, example: null }

    ApiResponseGroupBuyDetailResponse:
