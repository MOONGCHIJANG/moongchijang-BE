spring:
  web:
    resources:
      add-mappings: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations:
      - classpath:db/migration

server:
  forward-headers-strategy: framework

app:
  s3:
    bucket: ${S3_BUCKET}
    prefix: ${S3_PREFIX}

naver:
  api:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}

portone:
  store-id: ${PORTONE_STORE_ID}
  channel-key: ${PORTONE_CHANNEL_KEY}
  api-secret: ${PORTONE_API_SECRET}
  payment-api-base-url: ${PORTONE_PAYMENT_API_BASE_URL:https://api.portone.io}

springdoc:
  swagger-ui:
    url: /dev/openapi.yaml
    config-url: /dev/v3/api-docs/swagger-config

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    redirect-uri: ${KAKAO_REDIRECT_URI}

coolsms:
  api-key: ${COOLSMS_API_KEY}
  api-secret: ${COOLSMS_API_SECRET}
  sender: ${COOLSMS_SENDER}

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration-minutes: 60

auth:
  refresh:
    expiration-days: ${AUTH_REFRESH_EXPIRATION_DAYS:14}

aligo:
  api-key: ${ALIGO_API_KEY}
  user-id: ${ALIGO_USER_ID}
  sender-key: ${ALIGO_SENDER_KEY}
  template-code: ${ALIGO_TEMPLATE_CODE}
  sender: ${ALIGO_SENDER}

ses:
  enabled: ${SES_ENABLED:false}
  region: ${SES_REGION}
  from-email: ${SES_FROM_EMAIL}

groupbuy:
  status-transition:
    fixed-delay-ms: ${GROUPBUY_STATUS_TRANSITION_FIXED_DELAY_MS:60000}
    batch-size: ${GROUPBUY_STATUS_TRANSITION_BATCH_SIZE:500}
    lock:
      wait-ms: ${GROUPBUY_STATUS_TRANSITION_LOCK_WAIT_MS:100}
      lease-ms: ${GROUPBUY_STATUS_TRANSITION_LOCK_LEASE_MS:55000}
