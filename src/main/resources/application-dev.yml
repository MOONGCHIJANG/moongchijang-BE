spring:
  web:
    resources:
      add-mappings: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  forward-headers-strategy: framework

app:
  s3:
    bucket: ${S3_BUCKET}
    prefix: ${S3_PREFIX}
